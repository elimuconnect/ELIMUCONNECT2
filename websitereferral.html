<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    width:95%;
    max-width:650px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#0066cc;
    font-size:42px;
    margin-bottom:20px;
}

p{
    font-size:22px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:18px;
    font-size:22px;
    border:2px solid #ccc;
    border-radius:10px;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:22px;
    font-size:34px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    background:#0a8f2d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#087324;
}
</style>
</head>

<body>

<div class="container">

<h1>Welcome!</h1>

<p>Please enter your full name before continuing.</p>

<input
id="fullName"
type="text"
placeholder="Enter your full name">

<button id="continueBtn">
🚀 OPEN MY PORTFOLIO 🚀
</button>

</div>

</body>
</html>
