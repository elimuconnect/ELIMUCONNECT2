<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  /* Global Styles */

  /* Competency sections */

  /* Status messages */
  #status, #assessmentStatus {
    font-weight: 500;

  margin-top: 12px;
}

  /* Responsive */

    table, th, td {
      font-size: 14px;
    }
    button {
      width: 100%;
    }
  }



/* Top row layout */
.top-row {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

<body>
<div class="container">

  </div>

</div>
  <div class="card">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://zcmzuetusvpmvubbjlmx.supabase.co",
  "sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn"
);

const SYSTEM_YEAR = 2026;
document.getElementById("yearLabel").innerText = SYSTEM_YEAR;

const classId = localStorage.getItem("class_id");
const subjectId = localStorage.getItem("subject_id");
const academicYear = localStorage.getItem("academic_year") || SYSTEM_YEAR;

if (!classId || !subjectId) {
  alert("Please select a class and subject first.");
  window.location.href="teacher.html";
}



function getAssessmentFilters() {
  return {
    termId: document.getElementById("termSelect").value,
    assessmentTypeId: document.getElementById("assessmentTypeSelect").value,
    category: document.getElementById("assessmentCategorySelect").value
  };
}


function isEditAllowed(createdAt) {
  const EDIT_WINDOW_DAYS = 14;

  if (!createdAt) {
    return { allowed: true, remainingDays: EDIT_WINDOW_DAYS };
  }

  const created = new Date(createdAt);
  const now = new Date();

  const diffTime = now.getTime() - created.getTime();
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const remainingDays = EDIT_WINDOW_DAYS - diffDays;

  return {
    allowed: diffDays < EDIT_WINDOW_DAYS,
    remainingDays: remainingDays
  };
}

  

function resetSaveButton() {
  const saveBtn = document.getElementById("saveAssessment");
  const statusEl = document.getElementById("status");

  if (saveBtn) {
    saveBtn.disabled = false;
    saveBtn.innerText = "Save Assessment";
  }

  if (statusEl) statusEl.innerText = "";
}

  
// Display class and subject
const { data: classData } = await supabase.from("classes").select("name").eq("id", classId).single();
const { data: subjectData } = await supabase.from("subjects").select("name").eq("id", subjectId).single();
document.getElementById("classLabel").innerText = classData?.name || "N/A";
document.getElementById("subjectLabel").innerText = subjectData?.name || "N/A";

// Load terms
const { data: terms } = await supabase.from("terms").select("id, name");
document.getElementById("termSelect").innerHTML = `<option value="" disabled selected>-- Select Term --</option>${terms.map(t => `<option value="${t.id}">${t.name}</option>`).join("")}`;

// Load assessment types
const { data: assessmentTypes } = await supabase.from("assessment_types").select("id, name");
document.getElementById("assessmentTypeSelect").innerHTML = `<option value="" disabled selected>-- Select Assessment Type --</option>${assessmentTypes.map(a => `<option value="${a.id}">${a.name}</option>`).join("")}`;

window.addEventListener("load", () => {
 
  setTimeout(loadExistingAssessment, 300); // then load
});
  
// Load achievement levels
const { data: levels } = await supabase
  .from("achievement_levels")
  .select("id, label")
  .order("order_index", { ascending: true });
// Load competencies and populate top core competencies
const { data: competencies } = await supabase.from("competencies").select("id, name, subject_id").or("is_active.is.null,is_active.eq.true").order("name");
const coreContainer = document.getElementById("coreCompetenciesContainer");

competencies
  .filter(c => !c.subject_id)   // Only global core competencies
  .forEach(c => {
    const label = document.createElement("label");
    label.className = "competency-checkbox";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = c.id;
    checkbox.className = "coreCompetency";
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(c.name));
    coreContainer.appendChild(label);
  });



// Load students
const { data: students } = await supabase
  .from("students")
  .select("id, admission_number, full_name")
  .eq("class_id", classId)
  .order("full_name", { ascending: true });

const tbody = document.getElementById("studentsBody");

if (!students?.length) {
  tbody.innerHTML = `<tr><td colspan="3">No students in this class</td></tr>`;
} else {
  tbody.innerHTML = students.map(s => `
<tr data-id="${s.id}">
  <td>${s.admission_number || ""}</td>
  <td>${s.full_name || ""}</td>
  <td>
    <select class="performanceLevel">
      ${levels.map(l => `
        <option value="${l.id}" ${l.label.includes("X") ? "selected" : ""}>
          ${l.label}
        </option>
      `).join("")}
    </select>
  </td>
</tr>`).join("");
}

  

// Load strands and sub-strands from DB
// Containers
const strandContainer = document.getElementById("strandContainer");
const sleContainer = document.getElementById("sleContainer");
  
let strands = []; // declare globally
async function loadStrandsAndAttachListeners() {
  // Load strands for the selected subject
  const { data } = await supabase.from("strands")
    .select("id, name")
    .eq("subject_id", subjectId)
    .eq("grade", 10)
    .order("name");

strands = data || [];

  // Populate strands as checkboxes
  strandContainer.innerHTML = ""; // clear first
  strands.forEach(s => {
    const label = document.createElement("label");
    label.className = "competency-checkbox";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = s.id;
    checkbox.className = "strandCheckbox";
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(s.name));
    strandContainer.appendChild(label);
  });

  // Trigger loading SLEs when a strand is checked/unchecked
  document.querySelectorAll(".strandCheckbox").forEach(cb => {
    cb.addEventListener("change", loadSLEsForSelectedStrands);
  });
}

// ✅ Load SLEs for selected strands
async function loadSLEsForSelectedStrands() {
  const selectedStrands = Array.from(
    document.querySelectorAll(".strandCheckbox:checked")
  ).map(cb => cb.value);

  // Save previously selected SLEs
  const previouslySelectedSLEs = Array.from(document.querySelectorAll(".sleCheckbox:checked")).map(cb => cb.value);

  sleContainer.innerHTML = "";

  if (!selectedStrands.length) return;

  for (let strandId of selectedStrands) {
    const { data: sles } = await supabase
      .from("learning_experiences")
      .select("id, name")
      .eq("strand_id", strandId)
      .order("name");

    sles.forEach(sle => {
      const label = document.createElement("label");
      label.className = "competency-checkbox";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = sle.id;
      checkbox.className = "sleCheckbox";
      checkbox.dataset.strandId = strandId;

      // Re-check if previously selected
      if (previouslySelectedSLEs.includes(sle.id)) checkbox.checked = true;

      label.appendChild(checkbox);
      const strandName = strands.find(st => st.id == strandId)?.name || "";
      label.appendChild(document.createTextNode(`${sle.name} (${strandName})`));
      sleContainer.appendChild(label);
    });
  }
}

// Call once on page load
await loadStrandsAndAttachListeners();


  
// ✅ Save assessment including strands + SLEs
document.getElementById("saveAssessment").onclick = async () => {

  const statusEl = document.getElementById("status");
  const saveBtn = document.getElementById("saveAssessment");

  // 🔵 Show saving message immediately
  statusEl.style.color = "#1a73e8";
  statusEl.innerText = "Saving assessment...";
  saveBtn.disabled = true;
  saveBtn.innerText = "Saving...";

  try {

    // -------------------------
    // YOUR EXISTING SAVE CODE
    // -------------------------
  const selectedStrands = Array.from(document.querySelectorAll(".strandCheckbox:checked")).map(cb => cb.value);
  const selectedSLEs = Array.from(document.querySelectorAll(".sleCheckbox:checked")).map(cb => cb.value);
const category = document.getElementById("assessmentCategorySelect").value;
 

    
  const termId = document.getElementById("termSelect").value;
  const assessmentTypeId = document.getElementById("assessmentTypeSelect").value;
  const selectedCoreCompetencies = Array.from(document.querySelectorAll(".coreCompetency:checked")).map(cb => cb.value);
  const subjectCompetency = document.getElementById("subjectCompetency").value.trim();

   if (!termId || !assessmentTypeId || !category) {
  alert("Select Term, Assessment Type and Category.");
  return;
}
  if (!selectedCoreCompetencies.length) { alert("Select at least one core competency."); return; }

  const studentRows = document.querySelectorAll("#studentsBody tr");
  let missingLevel = false;
  studentRows.forEach(row => {
    const level = row.querySelector(".performanceLevel")?.value;
    if (!level) { missingLevel = true; row.style.backgroundColor = "rgba(255,0,0,0.2)"; }
    else row.style.backgroundColor = "";
  });
  if (missingLevel) { alert("Some students are missing a Performance Level."); return; }

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return window.location.href = "index.html";

  const { data: profile } = await supabase.from("profiles").select("school_id").eq("auth_id", user.id).single();
  if (!profile?.school_id) { alert("Cannot determine school_id"); return; }

  const schoolId = profile.school_id;
    const today = new Date().toISOString();

    // -------------------------
    // TITLE WITH SEQUENCE NUMBER
    // -------------------------
    const { data: existingList } = await supabase
      .from("assessments")
      .select("id")
      .eq("class_id", classId)
      .eq("subject_id", subjectId)
      .eq("term_id", termId)
      .eq("academic_year", academicYear);

    const sequence = (existingList?.length || 0) + 1;

    const assessmentTitle =
      `${subjectData.name} - ${document.getElementById("termSelect").selectedOptions[0].text} (${academicYear})-${sequence}`;

  // 🔎 Check existing assessment
  let { data: existingAssessment } = await supabase.from("assessments")
    .select("*")
    .eq("class_id", classId)
    .eq("subject_id", subjectId)
    .eq("term_id", termId)
    .eq("assessment_type_id", assessmentTypeId)
    .eq("academic_year", academicYear)
    .order("created_at", { ascending: false })
    .limit(1)
    .maybeSingle();

let assessmentId;



 if (existingAssessment) {

  const editCheck = isEditAllowed(existingAssessment.created_at);

  if (editCheck.allowed) {

    // ✅ Update existing
    assessmentId = existingAssessment.id;

    await supabase.from("assessments")
      .update({
        core_competencies: selectedCoreCompetencies,
        subject_competencies: subjectCompetency,
        category: category
      })
      .eq("id", assessmentId);

  } else {

    // ✅ Create NEW (after 14 days)
    const { data: newAssessment, error } = await supabase
      .from("assessments")
      .insert([{
        title: assessmentTitle,
        class_id: classId,
        subject_id: subjectId,
        learning_area_id: subjectId,
        school_id: schoolId,
        term_id: termId,
        academic_year: academicYear,
        assessment_type_id: assessmentTypeId,
        category: category,
        assessment_date: today,
        created_by: user.id,
        core_competencies: selectedCoreCompetencies,
        subject_competencies: subjectCompetency
      }])
      .select()
      .single();

    if (error) {
      document.getElementById("status").innerText = error.message;
      return;
    }

    assessmentId = newAssessment.id;
  }

} else {

  // 🆕 FIRST TIME EVER → create assessment
  const { data: newAssessment, error } = await supabase
    .from("assessments")
    .insert([{
      title: assessmentTitle,
      class_id: classId,
      subject_id: subjectId,
      learning_area_id: subjectId,
      school_id: schoolId,
      term_id: termId,
      academic_year: academicYear,
      assessment_type_id: assessmentTypeId,
      category: category,
      assessment_date: today,
      created_by: user.id,
      core_competencies: selectedCoreCompetencies,
      subject_competencies: subjectCompetency
    }])
    .select()
    .single();

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  assessmentId = newAssessment.id;
}


// ===============================
// SAVE STRANDS + LEARNING EXPERIENCES
// (Optional – only if selected)
// ===============================



// 🔎 Check if assessment already has strands (to avoid duplicates)
const { data: existingStrands, error: checkError } = await supabase
  .from("assessment_strands")
  .select("id")
  .eq("assessment_id", assessmentId);

if (checkError) {
  statusEl.innerText = checkError.message;
  return;
}

// If user selected strands → update/replace rows
if (selectedStrands.length) {

  // Build rows for strands and SLEs
  const sleCheckboxes = Array.from(document.querySelectorAll(".sleCheckbox"));
  const strandRows = [];

  sleCheckboxes.forEach(cb => {
    if (cb.checked) {
      strandRows.push({
        assessment_id: assessmentId,
        strand_id: cb.dataset.strandId,
        learning_experience_id: cb.value
      });
    }
  });

  selectedStrands.forEach(sId => {
    const hasSLE = strandRows.some(row => row.strand_id === sId);
    if (!hasSLE) {
      strandRows.push({
        assessment_id: assessmentId,
        strand_id: sId,
        learning_experience_id: null
      });
    }
  });

  // Delete old rows then insert fresh (replace)
  await supabase
    .from("assessment_strands")
    .delete()
    .eq("assessment_id", assessmentId);

  if (strandRows.length) {
    const { error } = await supabase
      .from("assessment_strands")
      .insert(strandRows);

    if (error) {
      statusEl.innerText = error.message;
      return;
    }
  }

} else {
  // 👉 User did not select strands → skip strand saving
  console.log("No strands selected. Skipping strand save.");
}



    
// 🔹 Save student results (skip "Not Assessed")
const rows = Array.from(studentRows)
  .map(tr => {

    const levelId = tr.querySelector(".performanceLevel").value;

    // Find the label of this level from loaded levels
    const levelLabel = levels.find(l => l.id == levelId)?.label || "";

    // Skip if level is Not Assessed (X)
    if (levelLabel.includes("X")) return null;

    return {
      assessment_id: assessmentId,
      student_id: tr.dataset.id,
      subject_id: subjectId,
      term_id: termId,
      assessment_type_id: assessmentTypeId,
      achievement_level_id: levelId,
      academic_year: academicYear,
      teacher_id: user.id,
      created_by: user.id,
      school_id: schoolId
    };

  })
  .filter(r => r !== null); // remove skipped students


// 1. Delete old results
const { error: deleteError } = await supabase
  .from("assessment_results")
  .delete()
  .eq("assessment_id", assessmentId);

if (deleteError) {
  statusEl.innerText = deleteError.message;
  return;
}

// 2. Insert / update new results
const { error: resultError } = await supabase
  .from("assessment_results")
  .upsert(rows, {
    onConflict: "assessment_id,student_id"
  });

if (resultError) {
  statusEl.innerText = resultError.message;
  return;
}

statusEl.style.color = "green";
statusEl.innerText = "Assessment saved successfully!";

} catch (err) {
  statusEl.style.color = "red";
  statusEl.innerText = "Error: " + err.message;
} finally {
  saveBtn.disabled = false;
  saveBtn.innerText = "Save Assessment";
}
};

async function loadExistingAssessment() {

  const statusEl = document.getElementById("assessmentStatus");

  const { termId, assessmentTypeId, category } = getAssessmentFilters();

  if (!termId || !assessmentTypeId || !category) {
    statusEl.innerText = "";
    return null;
  }

  const { data: existingAssessment } = await supabase
    .from("assessments")
    .select("*")
    .eq("class_id", classId)
    .eq("subject_id", subjectId)
    .eq("term_id", termId)
    .eq("assessment_type_id", assessmentTypeId)
    .eq("academic_year", academicYear)
    .eq("category", category)
    .order("created_at", { ascending: false })
    .limit(1)
    .maybeSingle();

  // =========================
  // CASE 1: NO ASSESSMENT
  // =========================
  if (!existingAssessment) {
    statusEl.innerText = "No previous assessment found. You can create a new one.";

    clearFormForNewAssessment();   // ✅ ONLY HERE
    enableAllInputs();
    return null;
  }

  // =========================
  // CASE 2: EXISTS
  // =========================
  const editCheck = isEditAllowed(existingAssessment.created_at);

  if (editCheck.allowed) {

    statusEl.innerText =
      `Existing assessment found. Editing allowed for ${Math.max(editCheck.remainingDays, 0)} more day(s).`;

    // ✅ LOAD DATA FIRST
    loadAssessmentData(existingAssessment);

    enableAllInputs();
  }

  // =========================
  // CASE 3: EXPIRED
  // =========================
  else {

    statusEl.innerText =
      "Editing window closed. You can create a new assessment now.";

    clearFormForNewAssessment();
    enableAllInputs();
  }
}
  
 document.getElementById("termSelect").onchange = loadExistingAssessment;

function enableAllInputs() {
  document.querySelectorAll(".performanceLevel").forEach(sel => sel.disabled = false);
  document.getElementById("subjectCompetency").disabled = false;
  document.querySelectorAll(".strandCheckbox").forEach(cb => cb.disabled = false);
  document.querySelectorAll(".sleCheckbox").forEach(cb => cb.disabled = false);
  document.querySelectorAll(".coreCompetency").forEach(cb => cb.disabled = false);
}


function clearFormForNewAssessment() {

  // 🔥 FORCE reset performance levels properly
  document.querySelectorAll(".performanceLevel").forEach(sel => {
    sel.value = "";              // clear value
    sel.selectedIndex = 0;       // fallback to first option
  });

  document.getElementById("subjectCompetency").value = "";

  document.querySelectorAll(".coreCompetency").forEach(cb => cb.checked = false);
  document.querySelectorAll(".strandCheckbox").forEach(cb => cb.checked = false);

  document.getElementById("sleContainer").innerHTML = "";
}
  
  // Toggle dropdown
document.getElementById("dropdownBtn").onclick = () => {
  const container = document.getElementById("coreCompetenciesContainer");
  container.style.display = container.style.display === "block" ? "none" : "block";
};

// Close dropdown if clicked outside
document.addEventListener("click", function(event) {
  const dropdown = document.querySelector(".dropdown");
  if (!dropdown.contains(event.target)) {
    document.getElementById("coreCompetenciesContainer").style.display = "none";
  }
});


// Toggle dropdowns
document.getElementById("dropdownStrandBtn").onclick = () => {
  strandContainer.style.display = strandContainer.style.display === "block" ? "none" : "block";
};
document.getElementById("dropdownSLEBtn").onclick = () => {
  sleContainer.style.display = sleContainer.style.display === "block" ? "none" : "block";
};
