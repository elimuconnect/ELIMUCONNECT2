<body>

<div class="container">

  <div class="logo">
    <div class="logo-circle">🔐</div>
  </div>

  <h1>Reset Password</h1>

  <p class="subtitle">
    Create a strong new password for your Smart Elimu Connect account.
  </p>

  <div class="input-group">
    <input
      id="newPassword"
      type="password"
      placeholder="Enter New Password"
    >

    <span class="toggle" onclick="togglePassword()">
      Show
    </span>
  </div>

  <button onclick="updatePassword()">
    Update Password
  </button>

  <div id="message"></div>

  <div class="footer">
    Smart Elimu Connect • Secure Password Recovery
  </div>

</div>

<script>
const SUPABASE_URL =
"sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const SUPABASE_KEY =
"sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn";

const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function togglePassword(){

  const input =
    document.getElementById("newPassword");

  const toggle =
    document.querySelector(".toggle");

  if(input.type === "password"){
    input.type = "text";
    toggle.innerText = "Hide";
  }else{
    input.type = "password";
    toggle.innerText = "Show";
  }
}

window.onload = async () => {

  const { data, error } =
    await client.auth.getSession();

  if(error || !data.session){

    document.getElementById("message").innerHTML =
      `<div class="error">
        Invalid or expired reset link.
      </div>`;
  }
};

async function updatePassword(){

  const password =
    document.getElementById("newPassword").value;

  const message =
    document.getElementById("message");

  if(password.length < 6){

    message.innerHTML =
      `<div class="error">
        Password must be at least 6 characters.
      </div>`;

    return;
  }

  const { error } =
    await client.auth.updateUser({
      password: password
    });

  if(error){

    message.innerHTML =
      `<div class="error">
        ${error.message}
      </div>`;

  }else{

    message.innerHTML =
      `<div class="success">
        Password updated successfully!
      </div>`;

    setTimeout(() => {
      window.location.href = "indexbest.html";
    }, 1800);
  }
}
</script>
