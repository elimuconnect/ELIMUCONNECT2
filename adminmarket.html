    .from("commissions")

    data.forEach(c => {
      total += Number(c.amount || 0);
    });
  }

  // LOAD DOCUMENTS FOR THIS MARKETER
  const { data: docs } = await client
    .from("marketer_documents")
    .select("*")
    .eq("marketer_id", id)
    .order("created_at", { ascending: false });

  let docsHtml = `<h3>📂 Documents</h3>`;

    docsHtml += `<p>No documents uploaded.</p>`;
  } else {

    docs.forEach(d => {

          <h4>${d.title}</h4>

          <p>
            ${d.is_required ? "✅ Required" : "📌 Optional"}

            📂 View File

          <br><br>

          <button onclick="downloadAdminDocument('${d.file_url}', '${d.title}')">
            ⬇ Download
          </button>

        </div>
      `;
    });
  }

  document.getElementById("detail").innerHTML = `
    <div class="card">
      <h3>${selectedMarketer.name}</h3>
      <p><b>Code:</b> ${selectedMarketer.code}</p>
      <p><b>County:</b> ${selectedMarketer.county}</p>
      <p><b>Total Earnings:</b> Ksh ${total}</p>
      <p><b>Schools:</b> ${mySchools.length}</p>

  `;

  // SHOW DOCUMENTS UNDER IT
  document.getElementById("marketerDocs").innerHTML = docsHtml;
}

async function uploadMaterial() {

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("file").files[0];
  const statusEl = document.getElementById("uploadStatus");
  const btn = event.target;

  if (!file) return alert("Select file first");

  // 🔵 START LOADING
statusEl.innerHTML = '<span class="loader"></span> Uploading document...';
  statusEl.style.color = "#2563eb";
  btn.disabled = true;
  btn.innerText = "Uploading...";

  try {

    const safeName = file.name.replace(/\s/g, "_");
    const filePath = `training/${Date.now()}_${safeName}`;

    // 1. upload file
   const { error } = await client
  .storage
  .from("training-files")
  .upload(filePath, file, {
    contentType: file.type,
    upsert: false
  });

    if (error) throw error;

    // 2. get public URL
    const { data: urlData } = client
      .storage
      .from("training-files")
      .getPublicUrl(filePath);

    const file_url = urlData.publicUrl;

    // 3. save to DB
    const { error: dbError } = await client
      .from("training_materials")
      .insert({
        title,
        description,
        file_url,
        file_type: file.type
      });

    if (dbError) throw dbError;

    // 🟢 SUCCESS
    statusEl.innerHTML = "✅ Upload successful!";
    statusEl.style.color = "#16a34a";

    // reset form
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("file").value = "";
    await loadMaterials();

  } catch (err) {
    console.log(err);

    // 🔴 ERROR
    statusEl.innerHTML = "❌ Upload failed. Try again.";
    statusEl.style.color = "#dc2626";
  }

  // 🔁 RESET BUTTON
  btn.disabled = false;
  btn.innerText = "Upload";
}

async function downloadAdminDocument(fileUrl, filename) {

  const path = fileUrl.split("/training-files/")[1];

  const { data, error } = await client.storage
    .from("training-files")
    .download(path);

  if (error) {
    alert("Download failed");
    return;
  }

  const blobUrl = URL.createObjectURL(data);

  const a = document.createElement("a");
  a.href = blobUrl;
  a.download = filename || "document";

  document.body.appendChild(a);
  a.click();

  a.remove();
  URL.revokeObjectURL(blobUrl);
}
  

async function deleteMaterial(id, fileUrl) {

  const confirmDelete = confirm("Delete this material?");
  if (!confirmDelete) return;

  try {

    // remove from storage
    const path = fileUrl.split("/training-files/")[1];

    await client.storage
      .from("training-files")
      .remove([path]);

    // remove from database
    const { error } = await client
      .from("training_materials")
      .delete()
      .eq("id", id);

    if (error) throw error;

    alert("✅ Deleted successfully");

    loadMaterials();

  } catch (err) {
    console.log(err);
    alert("❌ Delete failed");
  }
}

async function editWebsite(id, name, url, desc) {

  const newName = prompt("Edit School Name:", name);
  if (newName === null) return;

  const newUrl = prompt("Edit Website URL:", url);
  if (newUrl === null) return;

  const newDesc = prompt("Edit Description:", desc);

  const { error } = await client
    .from("school_websites")
    .update({
      school_name: newName,
      website_url: newUrl,
      description: newDesc
    })
    .eq("id", id);

  if (error) {
    alert("❌ Update failed");
    console.log(error);
    return;
  }

  alert("✅ Website updated successfully");
  loadSchoolWebsites();
}

async function deleteWebsite(id) {

  const confirmDelete = confirm("Are you sure you want to delete this website?");

  const { error } = await client
    .from("school_websites")
    .delete()
    .eq("id", id);

  if (error) {
    alert("❌ Delete failed");
    console.log(error);
    return;
  }

  alert("🗑 Website deleted");
  loadSchoolWebsites();
}

let adminMarker;
let routingControl;

let visitData=[];
let currentSchool=null;

let watchID=null;
let currentPosition=null;

async function loadVisits(){

const {data,error}=await client
.from("school_visits")
.select(`
latitude,
longitude,
visited_at,

schools(
id,
school_name
),

marketers(
id,
name
)
`)
.order("visited_at",{ascending:false});

if(error){
console.log(error);
return;
}

visitData=data;

// create map once

if(!map){

map=L.map("map").setView([-1.267,36.821],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

}

// AGENTS

const agents=[
...new Map(
data.map(v=>[
v.marketers.id,
v.marketers
])
).values()
];

let html="<option value=''>Select Agent</option>";

agents.forEach(a=>{

html+=`
<option value="${a.id}">
${a.name}
</option>
`;

});

document.getElementById("agentSelect").innerHTML=html;

document.getElementById("agentSelect").onchange=loadSchoolsDropdown;

document.getElementById("schoolSelect").onchange=showSelectedSchool;

}



function loadSchoolsDropdown(){

const id=
document.getElementById(
"agentSelect"
).value;

const schools=
visitData.filter(v=>
v.marketers.id===id
);

let html=
"<option value=''>Select School</option>";

schools.forEach((s,i)=>{

html+=`

<option value="${i}">

${s.schools.school_name}

</option>

`;

});

document.getElementById(
"schoolSelect"
).innerHTML=html;

}


function showSelectedSchool(){

const agent=
document.getElementById(
"agentSelect"
).value;

const index=
document.getElementById(
"schoolSelect"
).value;


const schools=
visitData.filter(v=>
v.marketers.id===agent
);


const school=
schools[index];


if(!school)return;


currentSchool=school;


// remove old marker

if(schoolMarker){
map.removeLayer(schoolMarker);
}


// add school marker

schoolMarker=
L.marker([
school.latitude,
school.longitude
])
.addTo(map)
.bindPopup(
"🏫 "+school.schools.school_name
)
.openPopup();



map.setView(
[
school.latitude,
school.longitude
],
15
);



document.getElementById(
"visitInfo"
).innerHTML=

`
<b>School:</b>
${school.schools.school_name}

<br>

<b>Agent:</b>
${school.marketers.name}

<br>

<b>Visited:</b>
${new Date(
school.visited_at
).toLocaleString()}

`;


// start route

getRoute(
school.latitude,
school.longitude
);


}


 function getRoute(lat,lng){


if(!navigator.geolocation){

alert(
"GPS not supported"
);

return;

}


navigator.geolocation.getCurrentPosition(

(position)=>{


const userLat=
position.coords.latitude;

const userLng=
position.coords.longitude;



// remove old GPS marker

if(adminMarker){
map.removeLayer(adminMarker);
}


// add admin location

adminMarker=
L.marker([
userLat,
userLng
],
{
icon:L.icon({

iconUrl:
"https://cdn-icons-png.flaticon.com/512/64/64113.png",

iconSize:[
35,
35
]

})
})
.addTo(map)
.bindPopup(
"📍 Your location"
);



if(routingControl){

map.removeControl(
routingControl
);

}


// create route


routingControl=
L.Routing.control({

waypoints:[

L.latLng(
userLat,
userLng
),

L.latLng(
lat,
lng
)

],


routeWhileDragging:false,


showAlternatives:true,

show:true,

collapsible:true,

lineOptions:{
styles:[
{
color:"#2563eb",
weight:5
}
]
}

})


.on(
'routesfound',
function(e){


const route=
e.routes[0];


const distance=
(
route.summary.totalDistance/1000
)
.toFixed(2);


const time =
Math.round(
(route.summary.totalTime / 60) * 1.2
);


document.getElementById(
"routeInfo"
).innerHTML=

`

<b>🚗 Route Found</b>

<br><br>

📏 Distance:
${distance} km

<br>

⏱ Estimated Time:
${time} minutes


`;


document.getElementById(
"navigateBtn"
).style.display="inline-block";


}

)

.addTo(map);



},


(error)=>{

alert(
"Please allow location access"
);

}


);


} 



function startLiveTracking(){


if(!currentSchool){

alert(
"Select school first"
);

return;

}



document.getElementById(
"stopNavBtn"
).style.display="inline-block";


document.getElementById(
"navigateBtn"
).style.display="none";



watchID=
navigator.geolocation.watchPosition(


(position)=>{


const lat=
position.coords.latitude;


const lng=
position.coords.longitude;


currentPosition={
lat,
lng
};



// update moving marker

if(adminMarker){

adminMarker.setLatLng([
lat,
lng
]);

}

else{


adminMarker=
L.marker([
lat,
lng
])
.addTo(map)
.bindPopup(
"🟢 Live Location"
);


}


// update route

updateRoute(
lat,
lng
);



},

(error)=>{

alert(
"GPS tracking error"
);

},


{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}



);



}


  
function updateRoute(lat,lng){


if(!currentSchool)
return;



if(routingControl){

map.removeControl(
routingControl
);

}



routingControl=
L.Routing.control({

router: L.Routing.osrmv1({
serviceUrl:
'https://router.project-osrm.org/route/v1'
}),

waypoints:[

L.latLng(
lat,
lng
),


L.latLng(
currentSchool.latitude,
currentSchool.longitude
)


],


show:false,


routeWhileDragging:false,


lineOptions:{

styles:[

{
color:"#16a34a",
weight:6
}

]

}


})


.on(
'routesfound',
function(e){


const route=
e.routes[0];



const distance =
(
route.summary.totalDistance / 1000
);


const displayDistance =
distance.toFixed(2);


const minutes =
Math.round(
(route.summary.totalTime / 60) * 1.2
);
  

if(distance < 0.05){

document.getElementById(
"routeInfo"
).innerHTML =

`
<b>✅ Arrived</b>

<br><br>

You have reached the school location.

`;

return;

}


document.getElementById(
"routeInfo"
).innerHTML=

`

<b>🟢 Live Navigation</b>

<br><br>

📍 Distance remaining:
${displayDistance} km

<br>

⏱ Time remaining:
${minutes} minutes

`;



}

)


.addTo(map);


}


  function stopLiveTracking(){


if(watchID){

navigator.geolocation.clearWatch(
watchID
);

}


if(routingControl){

map.removeControl(
routingControl
);

}


document.getElementById(
"stopNavBtn"
).style.display="none";


document.getElementById(
"navigateBtn"
).style.display="inline-block";


document.getElementById(
"routeInfo"
).innerHTML=
"Navigation stopped.";


}

  

document.getElementById("navigateBtn")
.onclick=function(){

startLiveTracking();

};


document.getElementById("stopNavBtn")
.onclick=function(){

stopLiveTracking();

};



function toggleSection(id){

const section=document.getElementById(id);

if(section.style.display==="none"){
section.style.display="block";
}
else{
section.style.display="none";
}

}
  
/* ---------------- START ---------------- */
init();
</script>
</body>
</html>
