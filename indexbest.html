<!DOCTYPE html>
<html>
<head>
  <title>Smart Elimu Connect CBE Assessment & Reporting System</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      width: 92%;
      max-width: 460px;
      text-align: center;
    }

    h2 {
      margin-bottom: 26px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 18px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: #0066ff;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      margin-top: 14px;
      cursor: pointer;
    }

    .input-group {
      position: relative;
      width: 100%;
      margin: 12px 0;
    }

    .toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #0066ff;
    }

    .forgot-wrapper {
      width: 100%;
      text-align: right;
      margin-top: 10px;
    }

    .forgot-link {
      color: #0066ff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }

    .forgot-link:hover {
      color: #0047b3;
      text-decoration: underline;
    }

    .update-section {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="login-container">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle" onclick="togglePassword('password',this)">Show</span>
  </div>

  <div class="forgot-wrapper">
    <a href="#" id="forgotLink" class="forgot-link">Forgot Password?</a>
  </div>

  <button id="loginBtn">Login</button>

  <div class="update-section">
    <h3>Change Password</h3>

    <div class="input-group">
      <input id="newPassword" type="password" placeholder="New Password">
      <span class="toggle" onclick="togglePassword('newPassword',this)">Show</span>
    </div>

    <button id="updateBtn">Update Password</button>
  </div>
</div>

<script>
function togglePassword(id, el) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    el.innerText = "Hide";
  } else {
    input.type = "password";
    el.innerText = "Show";
  }
}
</script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://zcmzuetusvpmvubbjlmx.supabase.co",
  "sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn"
);

//
// LOGIN
//
document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  // confirm session
  const { data: sessionData } = await supabase.auth.getSession();

  if (!sessionData.session) {
    alert("Login failed: no session");
    return;
  }

  // show update password section
  document.querySelector(".update-section").style.display = "block";

  const { data: { user } } = await supabase.auth.getUser();

  const { data: profile, error: profileError } = await supabase
    .from("profiles")
    .select("role, school_id")
    .eq("auth_id", user.id)
    .single();

  if (profileError || !profile) {
    alert("Profile not found");
    return;
  }

  if (profile.role === "superadmin") {
    window.location.href = "superadmin.html";
  } else if (profile.role === "teacher") {
    const { data: school } = await supabase
      .from("schools")
      .select("package_type")
      .eq("id", profile.school_id)
      .single();

    if (school.package_type === "A") {
      window.location.href = "teacher2.html";
    } else {
      window.location.href = "teacher3.html";
    }

  } else if (profile.role === "parent") {
    window.location.href = "parent.html";

  } else if (profile.role === "admin") {
    window.location.href = "admin.html";

  } else {
    alert("Unknown role");
  }
};

//
// FORGOT PASSWORD
//
document.getElementById("forgotLink").onclick = async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("Enter email first");
    return;
  }

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: "https://elimuconnect.github.io/ELIMUCONNECT2/reset-password.html"
  });

  if (error) alert(error.message);
  else alert("Reset email sent");
};

//
// UPDATE PASSWORD
//
document.getElementById("updateBtn").onclick = async () => {

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    alert("You are not logged in");
    return;
  }

  const newPass = document.getElementById("newPassword").value.trim();

  if (!newPass) {
    alert("Enter new password");
    return;
  }

  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated successfully");
  }
};
</script>

</body>
</html>
