<!DOCTYPE html>
<html>
<head>
  <title>ELIMU CONNECT Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

     .login-container {
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);

    width: 92%;
    max-width: 460px; /* bigger desktop */
    min-width: 280px;

    text-align: center;
  }

  h2 {
    margin-bottom: 26px;
    font-size: 28px;
  }

  input {
    width: 100%;
    padding: 18px;
    margin: 12px 0;

    border: 1px solid #ccc;
    border-radius: 10px;

    font-size: 18px;
  }

  button {
    width: 100%;
    padding: 18px;
    background: #0066ff;
    border: none;
    border-radius: 10px;

    color: white;
    font-size: 18px;

    margin-top: 14px;
  }

  .footer-text {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
  }

  /* Mobile extra boost */
  @media (max-width: 600px) {
    .login-container {
      width: 96%;
      padding: 36px;
    }

    h2 {
      font-size: 30px;
    }

    input, button {
      font-size: 19px;
      padding: 20px;
    }
  }



  .input-group{
position:relative;
width:100%;
margin:12px 0;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#0066ff;
user-select:none;
}



<style>
.update-section {
  display: none;
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: #f9fbff;
  border: 1px solid #e0e8ff;
}

.update-section h3 {
  margin-bottom: 12px;
  font-size: 18px;
  color: #333;
}

.update-section button {
  background: #28a745;
}

.update-section button:hover {
  background: #218838;
}
</style>
    
</style>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
  <div class="input-group">
<input id="password" type="password" placeholder="Password">
<span class="toggle" onclick="togglePassword('password',this)">Show</span>
</div>
   <button onclick="login()">Login</button>

    <p class="footer-text">Secure login powered by Supabase</p>

    <div class="input-group">
<input id="newPassword" type="password" placeholder="New Password">
<span class="toggle" onclick="togglePassword('newPassword',this)">Show</span>
</div>
    <button id="updateBtn">Update Password</button>
  </div>

<p style="margin-top:10px;">
  <a href="#" onclick="resetPassword()">Forgot Password?</a>
</p>

<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true
  }
});

//
// LOGIN (UNCHANGED)
//
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  const { data: profile, error: profileError } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (profileError || !profile) {
    alert("No profile found");
    return;
  }

  // 🚨 DO NOT CHANGE YOUR REDIRECT LOGIC
  if (profile.role === "admin") {
    window.location.href = "adminmarketer.html";
  } else {
    window.location.href = "dashboard.html";
  }
}

//
// RESET PASSWORD (UNCHANGED)
//
async function resetPassword() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("Enter your email first");
    return;
  }

  const { error } = await client.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/reset-password.html"
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password reset email sent");
  }
}

//
// UPDATE PASSWORD (FIXED)
//
document.getElementById("updateBtn").onclick = async () => {

  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    alert("You are not logged in");
    return;
  }

  const newPass = document.getElementById("newPassword").value.trim();

  if (!newPass) {
    alert("Enter new password");
    return;
  }

  const { error } = await client.auth.updateUser({
    password: newPass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated successfully");
  }
};

//
// 🔥 SESSION CHECK ON PAGE LOAD (IMPORTANT)
//
async function checkAuthOnLoad() {
  const { data: { session } } = await client.auth.getSession();

  const section = document.querySelector(".update-section");

  if (!section) return;

  section.style.display = session ? "block" : "none";
}

checkAuthOnLoad();


</script>
</body>
</html>
