<!DOCTYPE html>
<html>
<head>
  <title>ELIMU CONNECT Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="box">
  <h2>Login</h2>

  <div class="input-group">
    <input id="email" type="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle" onclick="togglePassword('password', this)">Show</span>
  </div>

  <button id="loginBtn">Login</button>

  <p class="footer-text">Secure login powered by Supabase</p>

  <div class="input-group">
    <input id="newPassword" type="password" placeholder="New Password">
    <span class="toggle" onclick="togglePassword('newPassword', this)">Show</span>
  </div>

  <button id="updateBtn">Update Password</button>
</div>


<script>
function togglePassword(id,el){

const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
el.innerText="Hide";
}else{
input.type="password";
el.innerText="Show";
}

}


  
<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true
  }
});

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  // 1. Login
  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  // 2. Find role in marketers table
  const { data: profile, error: profileError } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (profileError || !profile) {
    alert("No profile found");
    return;
  }

  // 3. Redirect based on role
  if (profile.role === "admin") {
    window.location.href = "adminmarketer.html";
  } else {
    window.location.href = "dashboard.html";
  }
}


  
    document.getElementById("updateBtn").onclick = async () => {
  const newPass = document.getElementById("newPassword").value;

  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated successfully");
  }
};
</script>
</body>
</html>
