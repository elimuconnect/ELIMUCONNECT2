<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Term Report Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ================== BASE ================== */
body {
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background: #f4f6f9;
  color: #1f2937;
  line-height: 1.6;
  margin: 0;
  padding: 30px 15px;
}

* {
  max-width: 100%;
  box-sizing: border-box;
}

h2, h3 { margin-bottom: 6px; }
h4 { margin: 0; }
h5 {
  margin-top: 18px;
  margin-bottom: 6px;
}

/* ================== FORM CONTROLS ================== */
label {
  font-size: 15px;
  font-weight: 600;
  color: #6b7280;
  display: block;
  margin-bottom: 4px;
}

input, select {
  width: 100%;
  max-width: 400px;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 16px;
  background: #ffffff;
  transition: all 0.2s ease;
}

input:focus, select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

/* ================== ACTION PANEL ================== */
.actions-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: #ffffff;
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
  max-width: 600px;
}

/* ================== BUTTONS ================== */
button {
  width: 100%;
  max-width: 100%;
  padding: 16px 
  border-radius: 10px;
  border: none;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  background: #2563eb;
  color: white;
  transition: all 0.25s ease;
}

button:hover {
  background: #1e40af;
  transform: translateY(-1px);
}

button small {
  display: block;
  font-weight: 400;
  font-size: 12px;
  opacity: 0.9;
  margin-top: 2px;
}

/* ================== REPORT CARD LAYOUT ================== */
.a4-page {
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto 10mm auto;
  background: white;
  padding: 20mm 15mm;
  box-sizing: border-box;

  page-break-inside: avoid;
  break-inside: avoid;
}

  height: auto !important;
  overflow: visible !important;
}

.a4-page:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 36px rgba(0,0,0,0.08);
}

/* learner-page */
.learner-page {
  break-inside: avoid;
  page-break-inside: avoid;
}

/* ================== LEARNER HEADER ================== */
.learner-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;

  page-break-inside: avoid;
  break-inside: avoid;
}

.learner-header h4 {
  font-size: 20px;
  font-weight: 800;
}

.learner-header small {
  font-size: 13px;
  font-weight: 600;
  color: #6b7280;
}

/* ================== SUBJECT BLOCK ================== */
.subject-block {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #f0f0f0;

  page-break-inside: avoid;
  break-inside: avoid;
}

/* ================== TABLES ================== */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  table-layout: auto;
  page-break-inside: auto; /* Allows the table to move to a new page if it doesn't fit */
}

.table-wrapper {
  overflow: visible !important; /* Critical: PDF engines clip content if this is 'auto' or 'hidden' */
  -webkit-overflow-scrolling: touch;
  margin-bottom: 14px;
  page-break-inside: auto; 
}

thead {
  display: table-header-group;
}

th, td {
  padding: 8px 10px;
  border-bottom: 1px solid #e5e7eb;
}

th {
  background: #f9fafb;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #374151;
}
tr {
  page-break-inside: avoid !important; /* Prevents a single row from splitting across two pages */
  break-inside: avoid !important;
}

tr:last-child td {
  border-bottom: none;
}

/* prevent word splitting */
td {
  vertical-align: top;
  white-space: normal;
  word-wrap: normal;
  overflow-wrap: normal;
  hyphens: none;
}

/* ================== SUMMARY BOX ================== */
.summary-box {
  background: #f0f9ff;
  border-left: 4px solid #2563eb;
  padding: 12px 14px;
  margin: 14px 0;
  border-radius: 8px;

  page-break-inside: avoid;
  break-inside: avoid;
}

/* ================== CHART ================== */
.trend-box {
  height: 180px;
  margin-top: 14px;

  page-break-inside: avoid;
  break-inside: avoid;
}

.trend-box canvas {
  width: 100% !important;
  height: 100% !important;
}

/* ================== REPORT HEADER ================== */
.report-overview {
  text-align: center;
  margin-bottom: 16px;

  page-break-inside: avoid;
  break-inside: avoid;
}

.report-overview h3 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.4px;
}

/* ================== SCHOOL ANALYTICS ================== */
.school-analytics {
  page-break-inside: auto !important;
  break-inside: auto !important;
}

.school-analytics > * {
  page-break-inside: avoid !important;
  break-inside: avoid !important;
}

.school-analytics p,
.school-analytics li,
.school-analytics h3,
.school-analytics h4,
.school-analytics h5,
.school-analytics ul {
  page-break-inside: avoid !important;
  break-inside: avoid !important;
  margin: 0 0 6px 0;
}


/* ================== LEARNER CARD ================== */
.learner-card {
  overflow: visible !important;
  height: auto !important;

  page-break-inside: avoid;
  break-inside: avoid;
}

/* ================== DOWNLOAD BUTTON ================== */
#downloadCurrentViewBtn {
  display: none;
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 6px;
  background-color: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
  max-width: 200px;
  text-align: center;
  margin: 10px 0;
}

#downloadCurrentViewBtn:hover {
  background-color: #45a049;
}



.logo-container {
    page-break-inside: avoid !important;
    break-inside: avoid !important;
    display: block;
}

/* ================== UPDATED PRINT SAFETY ================== */
@media print {
  /* 1. Neutralize global breaks so they don't fight with the JS Batching */
  .a4-page, .learner-page, .learner-card {
    page-break-after: auto !important;
    page-break-before: auto !important;
    break-after: auto !important;
    break-before: auto !important;
  }

  /* 2. Keep the internal card content together so one student isn't split */
  .learner-card {
    page-break-inside: avoid !important;
  }

  /* 3. Your existing Table Safety (Keep this!) */
  table { 
    page-break-inside: auto !important; 
  }

  tr {
    page-break-inside: avoid !important;
    page-break-after: auto !important;
  }

  thead { display: table-header-group !important; }
  tfoot { display: table-footer-group !important; }
}


.report-overview {
    /* ✅ Prevents the browser from shifting the header into the unprintable margin */
    position: relative !important;
    top: 0 !important;
    display: block !important;
  }

  .logo-container img {
    /* ✅ Ensures the logo is treated as a block with its own space */
    display: block;
    margin-left: auto;
    margin-right: auto;
  }


#batchContainer, #batchContainer * {
  transform: none !important;
  zoom: 1 !important;
}



.card {
  border: 1px solid #ccc;
  border-radius: 5px;
  padding: 8px 12px;
  margin-bottom: 10px;
  background-color: #fefefe;
  break-inside: avoid;       /* Prevent splitting across pages */
  page-break-inside: avoid;  /* Extra safeguard */
  line-height: 1.6;
}


.controls-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

@media (min-width: 768px) {
  .controls-row {
    flex-direction: row;
  }
}



@media (max-width: 768px) {
  body {
    padding: 15px 10px;
  }

  h3 {
    font-size: 18px;
  }

  input, select, button {
    font-size: 16px;
  }

  .actions-box {
    padding: 15px;
  }
}



@media (max-width: 768px) {
  table {
    font-size: 13px;
  }

  th, td {
    padding: 6px;
  }
}

  transform: scale(0.98);

  content: "";

  background: rgba(255,255,255,0.2);

}

@keyframes shine {
  0% { left: -75%; }
  100% { left: 130%; }

</style>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://zcmzuetusvpmvubbjlmx.supabase.co",
  "sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn"
);

const SYSTEM_YEAR = "2026";
let results = [];
let schoolLogo = null;
let data = [];





  
let trendMap = {};
let avgMap = {}; // make it global so downloadPDF can access it
 let learnerSummary = {};
let previousRecords = [];
let previousAverages = {};


  

const levelColor = {
  "BE2": "#fee2e2",
  "BE1": "#f8d7da",
  "AE2": "#ffedd5",
  "AE1": "#fff3cd",
  "ME2": "#d4edda",
  "ME1": "#cce5ff",
  "EE2": "#dcfce7",
  "EE1": "#c6f6d5"
};

function getAchievementLabel(score) {
  if (score >= 7.5) return "EE1";
  if (score >= 6.5) return "EE2";
  if (score >= 5.5) return "ME1";
  if (score >= 4.5) return "ME2";
  if (score >= 3.5) return "AE1";
  if (score >= 2.5) return "AE2";
  if (score >= 1.5) return "BE1";
  return "BE2";
}


  function levelToScore(level) {
  if (!level) return 0;

  const clean = level.trim().toUpperCase();

  if (clean === "EE1") return 8;
  if (clean === "EE2") return 7;
  if (clean === "ME1") return 6;
  if (clean === "ME2") return 5;
  if (clean === "AE1") return 4;
  if (clean === "AE2") return 3;
  if (clean === "BE1") return 2;
  if (clean === "BE2") return 1;

  return 0;
}
  
const termSelect = document.getElementById("termSelect");
const viewMode = document.getElementById("viewMode");
const filterBox = document.getElementById("filterBox");
const reportDiv = document.getElementById("report");
const status = document.getElementById("status");





 // ===== PER SUBJECT COVERAGE =====
  let strandSet = new Set();
  let learningExpCount = 0;
  let coreSet = new Set();
  let subjectSet = new Set();
  let competencyCount = 0;

  
/* ========== AUTH ========== */
const { data: { user } } = await supabase.auth.getUser();
if (!user) location.href = "index.html";



const { data: profile } = await supabase
  .from("profiles")
  .select("school_id, role")
  .eq("auth_id", user.id)
  .single();

const teacherSchoolId = profile.school_id;






/* ========== SCHOOL DETAILS FROM SUPABASE ========== */
const { data: school, error: schoolError } = await supabase
  .from("schools")
  .select("name, po_box, postal_code, town, phone, email, logo_url")
  .eq("id", teacherSchoolId)
  .single();

if (schoolError) {
  console.error("School fetch error:", schoolError.message);
}


	

/* ========== LOAD TERMS ========== */
const { data: terms } = await supabase
  .from("terms")
  .select("id, name")
  .order("name");

termSelect.innerHTML =
  `<option value="">Select term</option>` +
  terms.map(t => `<option value="${t.id}">${t.name}</option>`).join("");

const categorySelect = document.getElementById("categorySelect");

const { data: categories } = await supabase
  .from("assessments")
  .select("category")
  .not("category", "is", null);

// remove duplicates
const uniqueCategories = [...new Set(categories.map(c => c.category))];

categorySelect.innerHTML =
  `<option value="">Select category</option>` +
  uniqueCategories.map(c => `<option value="${c}">${c}</option>`).join("");

/* ========== MAIN LOAD ========== */
async function loadReport() {
  reportDiv.innerHTML = "";
  filterBox.innerHTML = "";
  
  const term_id = termSelect.value;
  const selectedCategory = categorySelect.value;
  
  if (!term_id || !selectedCategory) {
  status.innerText = ".";
  return;
}

  const termName = terms.find(t => t.id === term_id)?.name;

  /* ===== LEARNER TERM AVERAGES FOR GRAPHS ===== */
  const { data: termAverages } = await supabase
    .from("learner_term_levels")
    .select("admission_number, term, average_score")
    .eq("academic_year", SYSTEM_YEAR);

  // Initialize avgMap globally
  avgMap = {}; 
  
  /* ===== AVERAGES (BATCHED TO PREVENT MISSING SUBJECTS) ===== */
  let avgFrom = 0;
  const avgBatchSize = 1000;

  while (true) {
    const { data: avgBatch, error: avgErr } = await supabase
      .from("term_subject_report_view2")
      .select("full_name, subject_name, average_score, achievement_level")
      .eq("term", termName)
		 .eq("assessment_category", selectedCategory)
      .range(avgFrom, avgFrom + avgBatchSize - 1);

    if (avgErr || !avgBatch || avgBatch.length === 0) break;

    avgBatch.forEach(a => {
      // FIX: Added safety check to prevent crash on null names
      if (!a.full_name) return; 

      const student = a.full_name.trim(); // Trim to ensure PDF name matching
      const subj = a.subject_name;

      if (!avgMap[student]) avgMap[student] = {};
      
      avgMap[student][subj] = {
        achievement_level: a.achievement_level,
        average_score: a.average_score
      };
    });

    if (avgBatch.length < avgBatchSize) break;
    avgFrom += avgBatchSize;
  }

  trendMap = {};
  termAverages?.forEach(r => {
    if (!trendMap[r.admission_number]) {
      trendMap[r.admission_number] = {};
    }
    trendMap[r.admission_number][r.term] = Number(r.average_score);
  });

  const previousTerm = terms
    .map(t => t.name)
    .sort()
    .filter(t => t < termName)
    .slice(-1)[0];

  if (previousTerm) {
    const { data } = await supabase
      .from("results2_report_view")
      .select("*")
      .eq("term", previousTerm)
      .eq("academic_year", SYSTEM_YEAR)
	  .eq("school_id", teacherSchoolId);

    previousRecords = data || [];
    previousRecords.forEach(r => {
      const adm = r.admission_number;
      const score = levelToScore(r.achievement_level);
      if (!previousAverages[adm]) {
        previousAverages[adm] = { total: 0, count: 0 };
      }
      previousAverages[adm].total += score;
      previousAverages[adm].count++;
    });
  }



let previousLearnerMap = {};

previousRecords?.forEach(r => {
  const adm = r.admission_number;
  const score = levelToScore(r.achievement_level);

  if (!previousLearnerMap[adm]) {
    previousLearnerMap[adm] = [];
  }

  previousLearnerMap[adm].push(score);
});
const hasPreviousData = Object.keys(previousLearnerMap || {}).length > 0;
  // STEP 2 — BUILD LEARNER SUMMARY
  learnerSummary = {};
  Object.keys(avgMap).forEach(student => {
    const subjectEntries = Object.values(avgMap[student]);
    if (subjectEntries.length === 0) return;

    const validScores = subjectEntries
      .map(s => Number(s.average_score))
      .filter(n => !isNaN(n) && n > 0);

    const overallAvg = validScores.length
      ? validScores.reduce((a, b) => a + b, 0) / validScores.length
      : null;

    learnerSummary[student] = {
      overall_average: overallAvg,
      overall_level: getAchievementLabel(overallAvg)
    };
  });

  let allResults = [];
  let from = 0;
  const batchSize = 1000;

  while (true) {
    const response = await supabase
      .from("results2_report_view")
      .select("*")
      .eq("term", termName)
		 .eq("assessment_category", selectedCategory)
      .eq("academic_year", SYSTEM_YEAR)
      .range(from, from + batchSize - 1)
	  .eq("school_id", teacherSchoolId);

    const batch = response.data;
    if (response.error || !batch || batch.length === 0) break;

    allResults = allResults.concat(batch);
    if (batch.length < batchSize) break;
    from += batchSize;
  }

  data = allResults;
  results = allResults;
  
  
console.log("Total Records Loaded:", data.length);





const schoolDetail = {
  name: school?.name || "—",
  po_box: school?.po_box || "—",
  postal_code: school?.postal_code || "—",
  town: school?.town || "—",
  phone: school?.phone || "—",
  email: school?.email || "—"
};



// 2. Logo Logic (Kept as before)
const manualLogos = {
  "SHANZU SENIOR SECONDARY SCHOOL": "https://res.cloudinary.com/dwvt4e9o2/image/upload/v1773573305/schoollogo1_rnpce8.jpg"
};
schoolLogo =
  school?.logo_url ||
  manualLogos[schoolDetail.name?.trim()] ||
  null;
 
// normalized records
const records = data.map(r => ({

  admission: r.admission_number,
  className: r.class_name,
  schoolName: r.school_name,
grade_name: r.grade_name,
grade_id: r.grade_id,
	class_id: r.class_id,
  subject: r.subject,

  core_competencies: r.core_competencies,
  subject_competencies: r.subject_competencies,

  level: r.achievement_level,
  remarks: r.remarks,
  assessment_id: r.assessment_id,
	 assessment_type: r.assessment_type,       // ✅ add this
	  assessment_category: r.assessment_category // ✅ add this
}));


// Collect all assessment IDs for this term
const assessmentIds = [...new Set(records.map(r => r.assessment_id).filter(Boolean))];

  
  const { data: strandData } = await supabase
  .from("assessment_strands_view")
  .select("*")
  .in("assessment_id", assessmentIds);


const strandMap = {};

strandData?.forEach(row => {
  if (!row.assessment_id) return;

  strandMap[row.assessment_id] ??= [];
  strandMap[row.assessment_id].push({
    strand: row.strand,
    outcome: row.learning_experience
  });
});
 
 
  
 function renderOverviewHeader({

 return `

function calculateTermIntelligence(records, previousRecords, previousTerm) {

  if (!previousTerm || !previousRecords?.length) {
    return {
      schoolImprovement: null,
      improvedClasses: [],
      decliningSubjects: [],
      improvingLearners: 0
    };
  }

  const learnerMap = {};
  const classMap = {};
  const subjectMap = {};

  const prevLearnerMap = {};
  const prevClassMap = {};
  const prevSubjectMap = {};

  // ===== CURRENT TERM PROCESSING =====
  records.forEach(r => {
    const score = levelToScore(r.level);
    if (!score) return;

    learnerMap[r.admission] ??= [];
    learnerMap[r.admission].push(score);

    classMap[r.className] ??= [];
    classMap[r.className].push(score);

    subjectMap[r.subject] ??= [];
    subjectMap[r.subject].push(score);
  });

  // ===== PREVIOUS TERM PROCESSING =====
  previousRecords.forEach(r => {
   const score = levelToScore(r.level);
    if (!score) return;

    const adm = r.admission_number;
    const cls = r.class_name;
    const sub = r.subject;

    prevLearnerMap[adm] ??= [];
    prevLearnerMap[adm].push(score);

    prevClassMap[cls] ??= [];
    prevClassMap[cls].push(score);

    prevSubjectMap[sub] ??= [];
    prevSubjectMap[sub].push(score);
  });

console.log("Current Subject Avg:", subjectMap);
console.log("Previous Subject Avg:", prevSubjectMap);
	
  function avg(arr) {
    return arr.length
      ? arr.reduce((a,b)=>a+b,0) / arr.length
      : null;
  }

  // ===== SCHOOL IMPROVEMENT =====
  const currentSchoolAvg = avg(Object.values(classMap).flat());
  const previousSchoolAvg = avg(Object.values(prevClassMap).flat());

  let schoolImprovement = null;

  if (previousSchoolAvg && previousSchoolAvg > 0) {
    schoolImprovement =
      ((currentSchoolAvg - previousSchoolAvg) / previousSchoolAvg) * 100;
  }

  // ===== IMPROVING LEARNERS =====
  let improvingLearners = 0;

  Object.entries(learnerMap).forEach(([adm, scores]) => {
    if (!prevLearnerMap[adm]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevLearnerMap[adm]);

    if (currentAvg - prevAvg >= 0.3) improvingLearners++;
  });

  // ===== TRUE IMPROVED CLASSES =====
  const improvedClasses = [];

  Object.entries(classMap).forEach(([cls, scores]) => {
    if (!prevClassMap[cls]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevClassMap[cls]);

    if (currentAvg - prevAvg >= 0.3) {
      improvedClasses.push(cls);
    }
  });

  // ===== TRUE DECLINING SUBJECTS =====
  const decliningSubjects = [];

  Object.entries(subjectMap).forEach(([sub, scores]) => {
    if (!prevSubjectMap[sub]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevSubjectMap[sub]);

    if (currentAvg - prevAvg <= -0.3) {
      decliningSubjects.push(sub);
    }
  });

  return {
    schoolImprovement,
    improvedClasses,
    decliningSubjects,
    improvingLearners
  };
}

function shortSubject(name) {
  if (!name) return "";

  const n = name.toLowerCase();

  // 🔥 HANDLE MATH VARIANTS PROPERLY
  if (n.includes("math")) {
    if (n.includes("core")) return "Core Math";
    if (n.includes("essential")) return "Ess Math";
    if (n.includes("pure")) return "Pure Math";
    if (n.includes("applied")) return "App Math";
    return "Math";
  }

  // direct mapping
  if (SUBJECT_SHORT[name]) return SUBJECT_SHORT[name];

  // 🔥 BETTER FALLBACK (multi-word compression)
  return name
    .split(" ")
    .map(w => w.substring(0, 3))
    .join(" ");
}




	
	
function generateBroadsheet(records, avgMap, mode = "grade") {

  let gradeClassMap = {};

  // ===== BUILD STRUCTURE =====
  records.forEach(r => {

    const grade = r.grade_name
      ? (String(r.grade_name).startsWith("Grade")
          ? r.grade_name
          : `Grade ${r.grade_name}`)
      : "Unknown";

    gradeClassMap[grade] ??= {};
    gradeClassMap[grade][r.className] ??= {};
    gradeClassMap[grade][r.className][r.student] ??= {
      admission: r.admission,
      subjects: {}
    };

    const subjectData = avgMap?.[r.student]?.[r.subject];
    if (!subjectData) return;

    const score = levelToScore(subjectData.achievement_level);
    if (typeof score !== "number" || isNaN(score)) return;

    gradeClassMap[grade][r.className][r.student].subjects[r.subject] = score;
  });


  let html = `
  ${renderOverviewHeader({
    school: schoolDetail.name,
    poBox: schoolDetail.po_box,
    postal: schoolDetail.postal_code,
    town: schoolDetail.town,
    phone: schoolDetail.phone,

    term: termName,
    year: SYSTEM_YEAR,
    logo: schoolLogo
  })}
`;


  // ===== GET SUBJECTS =====
  const getSubjects = (students) => {
    const set = new Set();
    Object.values(students).forEach(s => {
      Object.keys(s.subjects).forEach(sub => set.add(sub));
    });
    return Array.from(set);
  };


  // ===== BUILD TABLE =====
  const buildTable = (title, students, subjects) => {

    const ranked = Object.entries(students).map(([name, data]) => {

      const scores = subjects
        .map(sub => data.subjects[sub])
        .filter(v => typeof v === "number");

      const total = scores.reduce((a, b) => a + b, 0);
      const avg = scores.length ? total / scores.length : 0;

      return {
        name,
        admission: data.admission,
        subjects: data.subjects,
        total,
        avg
      };

    })
    .sort((a, b) => b.avg - a.avg); // ✅ rank by average


    return `
      <h3 style="margin-top:15px;">${title}</h3>
      <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Adm</th>


${subjects.map(s => `


<th title="${s}" style="
  font-size:14px;
  word-wrap:break-word;
  white-space:normal;
  text-align:center;
">
  ${shortSubject(s)}
</th>

		  
`).join("")}
		   
            <th>Total</th>
            <th>Average (/8)</th>
            <th>Level</th>
          </tr>
        </thead>
        <tbody>
          ${ranked.map((s, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${s.name}</td>
              <td>${s.admission}</td>

              ${subjects.map(sub => `


<td style="
  font-size:15px;
  text-align:center;
">
  ${s.subjects[sub] ?? "-"}
</td>
			   
              `).join("")}

              <td>${s.total.toFixed(2)}</td>
              <td>${s.avg.toFixed(2)}</td>
              <td>${getAchievementLabel(s.avg)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    `;
  };


  // =====================================================
  // MODE SWITCH
  // =====================================================

  if (mode === "grade") {

    Object.entries(gradeClassMap).forEach(([grade, classes]) => {

      let mergedStudents = {};

      Object.values(classes).forEach(students => {
        Object.entries(students).forEach(([name, data]) => {
          mergedStudents[name] = data;
        });
      });

      const subjects = getSubjects(mergedStudents);

      html += `<h2>📘 ${grade} Broadsheet (All Classes)</h2>`;

    });

  }


  else if (mode === "class") {

    Object.entries(gradeClassMap).forEach(([grade, classes]) => {

      html += `<h2>📘 ${grade}</h2>`;

      Object.entries(classes).forEach(([cls, students]) => {

       const subjects = getSubjects(students).sort();

        html += buildTable(`Class ${cls}`, students, subjects);
      });
    });
  }

  return html;
}

function generateSupportFlag(student, subjects) {

  const subjectAverages = [];

  Object.entries(subjects).forEach(([subject]) => {
    if (subject === "__admission") return;

    const subjectData = avgMap?.[student]?.[subject];
    if (!subjectData) return;

    const score = Number(subjectData.average_score);
    if (!isNaN(score)) {
      subjectAverages.push(score);
    }
  });

  if (!subjectAverages.length) return "";

  const overall = subjectAverages.reduce((a,b)=>a+b,0) / subjectAverages.length;

  const belowCount = subjectAverages.filter(a => a <= 2).length;

  /* 🔴 NEEDS SUPPORT */
  if (
    overall < 2.3 ||          // overall struggling
    belowCount >= 2           // weak in 2+ subjects
  ) {
    return `<span style="color:#c0392b;font-weight:bold;">🔴 Needs Learning Support</span>`;
  }

  /* 🟢 HIGH POTENTIAL */
  if (
    overall >= 3.5 &&
    subjectAverages.every(a => a >= 3) &&
    subjectAverages.some(a => a >= 4)
  ) {
    return `<span style="color:#1e8449;font-weight:bold;">🟢 High Potential</span>`;
  }

  /* 🟡 DEFAULT */
  return `<span style="color:#b9770e;font-weight:bold;">🟡 On Track</span>`;
}




	function generateStrengthsAndNeeds(student, subjects) {
  let strengths = [];
  let needs = [];

  const subjectScores = Object.entries(subjects)
    .filter(([sub]) => sub !== "__admission")
    .map(([sub, rows]) => {
      const scores = rows.map(r => levelToScore(r.level)).filter(s => s > 0);
      const avg = scores.length
        ? scores.reduce((a,b)=>a+b,0) / scores.length
        : 0;
      return { sub, avg };
    })
    .sort((a,b)=>b.avg - a.avg);

  // ✅ Strength ONLY if strong AND clearly better
  if (
    subjectScores.length > 1 &&
    subjectScores[0].avg >= 2.75 &&   // must be at least ME1
    (subjectScores[0].avg - subjectScores[1].avg >= 0.5)
  ) {
    strengths.push(subjectScores[0].sub);
  }

  // ✅ Needs = worst 2 weak subjects only
  needs = subjectScores
    .filter(s => s.avg < 2)
    .sort((a,b)=>a.avg - b.avg)
    .slice(0,2)
    .map(s => s.sub);

  return { strengths, needs };
}


function generateRecommendations(student, subjects, trend, supportFlag) {
  const teacher = [];
  const parent = [];
  const learner = [];

  const { strengths, needs } = generateStrengthsAndNeeds(student, subjects);

  /* ===== TEACHER ===== */
  if (supportFlag.includes("Needs Learning Support")) {
    teacher.push("Provide targeted remediation on core competencies.");
    teacher.push("Apply differentiated instruction for personalized support.");
  }

  if (trend === "📉 Declining") {
    teacher.push("Conduct one-on-one reviews to bridge learning gaps.");
  }

  if (strengths.length) {
    teacher.push(`Further challenge the learner in ${strengths.slice(0, 2).join(", ")}.`);
  }

  /* ===== PARENT ===== */
  if (needs.length) {
    parent.push(`Provide extra practice materials for ${needs.slice(0, 2).join(", ")}.`);
  }

  if (trend === "📉 Declining") {
    parent.push("Closely monitor daily study habits and revision.");
  }

  parent.push("Regularly consult with the subject teachers on progress.");

  /* ===== LEARNER ===== */
  if (strengths.length) {
    learner.push(`Maintain the excellent effort in ${strengths.slice(0, 2).join(", ")}.`);
  }

  if (needs.length) {
    learner.push(`Dedicate more time to revising ${needs.slice(0, 2).join(", ")}.`);
  }

  learner.push("Seek clarification immediately when a concept is unclear.");

  /* ===== DEFAULTS (2 only) ===== */
  const teacherDefault = [
    "Encourage active participation in all class activities.",
    "Monitor progress through regular formative assessments."
  ];

  const parentDefault = [
    "Ensure a quiet and conducive environment for study.",
    "Encourage consistent daily reading and revision."
  ];

  const learnerDefault = [
    "Submit all assignments and projects on time.",
    "Be proactive in asking questions during lessons."
  ];
  
  

  /* ===== ENSURE EXACTLY 2 ===== */
  const ensureTwo = (arr, defaults) => {
    const result = [...arr];

    for (let i = 0; result.length < 2 && i < defaults.length; i++) {
      if (!result.includes(defaults[i])) {
        result.push(defaults[i]);
      }
    }

    return result.slice(0, 2);
  };

  const wrapCards = (arr) => arr.map(text => `<div class="card">${text}</div>`);

  return {
    teacher: wrapCards(ensureTwo(teacher, teacherDefault)),
    parent: wrapCards(ensureTwo(parent, parentDefault)),
    learner: wrapCards(ensureTwo(learner, learnerDefault))
  };
}

    if (!chartArea) return;

    const y = scales.y;

    const bands = [
      { from: 1, to: 2, color: "rgba(248,215,218,0.35)" },   // Below
      { from: 2, to: 3, color: "rgba(255,243,205,0.35)" },   // Approaching

    ];

    ctx.save();

    bands.forEach(b => {
      const yTop = y.getPixelForValue(b.to);
      const yBottom = y.getPixelForValue(b.from);

      ctx.fillStyle = b.color;
      ctx.fillRect(
        chartArea.left,
        yTop,
        chartArea.right - chartArea.left,
        yBottom - yTop
      );
    });

    ctx.restore();
  }
};

function generalComment(score, subject) {

  switch(level) {

    case "ME1": comment = "Consistently meets expectations."; break;
    case "ME2": comment = "Good progress."; break;

    case "AE2": comment = "Developing understanding."; break;
    case "BE1": comment = "Below expectations."; break;

    default: comment = "No data available.";

}

const batchSize = 15;
let batchNum = 1;

for (let i = 0; i < cards.length; i += batchSize) {
    const batchContainer = document.createElement("div");
    batchContainer.style.width = "190mm";
    batchContainer.style.margin = "0 auto";

    const batch = Array.from(cards).slice(i, i + batchSize);
    const batchFilename = `Summary_Report_${term}_Batch_${batchNum}.pdf`;

    batch.forEach((learnerCard, index) => {
        const wrapper = document.createElement("div");
        
        // Remove any existing classes that might trigger CSS breaks
        learnerCard.classList.remove('a4-page', 'learner-page');
        
        // Use a cleaner approach for the wrapper break
        // Only apply the break if there is another card FOLLOWING this one in the batch
        if (index < batch.length - 1) {
            wrapper.style.display = "block";
            wrapper.style.pageBreakAfter = "always";
            wrapper.style.breakAfter = "page";
        } else {
            wrapper.style.pageBreakAfter = "avoid";
            wrapper.style.breakAfter = "avoid";
        }

        wrapper.style.padding = "0";
        wrapper.style.margin = "0";
        
        wrapper.appendChild(learnerCard.cloneNode(true));
        batchContainer.appendChild(wrapper);
    });

    // Final check to ensure the container itself doesn't have a trailing break
    batchContainer.style.pageBreakAfter = "avoid";

   
  await html2pdf().set({
        margin: [15, 10, 15, 10],
        filename: batchFilename,
        // 'avoid-all' mode prevents the library from inventing its own breaks
        pagebreak: { mode: 'css' }, 
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { 
            scale: 2,         // default is 1; increase to 2 for sharper text
            useCORS: true, 
            scrollY: 0,
            letterRendering: true 
        },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    }).from(batchContainer).save();

    await new Promise(resolve => setTimeout(resolve, 1200));
    batchNum++;
}
