function calculateTermIntelligence(records, previousRecords, previousTerm) {

  if (!previousTerm || !previousRecords?.length) {
    return {
      schoolImprovement: null,
      improvedClasses: [],
      decliningSubjects: [],
      improvingLearners: 0
    };
  }

  const learnerMap = {};
  const classMap = {};
  const subjectMap = {};

  const prevLearnerMap = {};
  const prevClassMap = {};
  const prevSubjectMap = {};

  // ===== CURRENT TERM PROCESSING =====
  records.forEach(r => {
    const score = levelToScore(r.level);
    if (!score) return;

    learnerMap[r.admission] ??= [];
    learnerMap[r.admission].push(score);

    classMap[r.className] ??= [];
    classMap[r.className].push(score);

    subjectMap[r.subject] ??= [];
    subjectMap[r.subject].push(score);
  });

  // ===== PREVIOUS TERM PROCESSING =====
  previousRecords.forEach(r => {
   const score = levelToScore(r.level);
    if (!score) return;

    const adm = r.admission_number;
    const cls = r.class_name;
    const sub = r.subject;

    prevLearnerMap[adm] ??= [];
    prevLearnerMap[adm].push(score);

    prevClassMap[cls] ??= [];
    prevClassMap[cls].push(score);

    prevSubjectMap[sub] ??= [];
    prevSubjectMap[sub].push(score);
  });

  function avg(arr) {
    return arr.length
      ? arr.reduce((a,b)=>a+b,0) / arr.length
      : null;
  }

  // ===== SCHOOL IMPROVEMENT =====
  const currentSchoolAvg = avg(Object.values(classMap).flat());
  const previousSchoolAvg = avg(Object.values(prevClassMap).flat());

  let schoolImprovement = null;

  if (previousSchoolAvg && previousSchoolAvg > 0) {
    schoolImprovement =
      ((currentSchoolAvg - previousSchoolAvg) / previousSchoolAvg) * 100;
  }

  // ===== IMPROVING LEARNERS =====
  let improvingLearners = 0;

  Object.entries(learnerMap).forEach(([adm, scores]) => {
    if (!prevLearnerMap[adm]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevLearnerMap[adm]);

    if (currentAvg - prevAvg >= 0.3) improvingLearners++;
  });

  // ===== TRUE IMPROVED CLASSES =====
  const improvedClasses = [];

  Object.entries(classMap).forEach(([cls, scores]) => {
    if (!prevClassMap[cls]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevClassMap[cls]);

    if (currentAvg - prevAvg >= 0.3) {
      improvedClasses.push(cls);
    }
  });

  // ===== TRUE DECLINING SUBJECTS =====
  const decliningSubjects = [];

  Object.entries(subjectMap).forEach(([sub, scores]) => {
    if (!prevSubjectMap[sub]) return;

    const currentAvg = avg(scores);
    const prevAvg = avg(prevSubjectMap[sub]);

    if (currentAvg - prevAvg <= -0.3) {
      decliningSubjects.push(sub);
    }
  });

  return {
    schoolImprovement,
    improvedClasses,
    decliningSubjects,
    improvingLearners
  };
}

function splitLearnerIntoPages() {
  const pages = document.querySelectorAll(".a4-page");

  pages.forEach(page => {
    const card = page.querySelector(".learner-card");
    if (!card) return;

    const maxHeight = page.clientHeight;
    let currentPage = page;

    Array.from(card.children).forEach(block => {
    if (
  !block.classList.contains("split-block") ||
  block.classList.contains("no-split")
) return;


      const blockBottom =
        block.getBoundingClientRect().bottom -
        currentPage.getBoundingClientRect().top;

      if (blockBottom > maxHeight + 20)  {
        // create new page
        const newPage = document.createElement("div");
        newPage.className = "a4-page learner-page";

        const newCard = document.createElement("div");
        newCard.className = "learner-card";

        newPage.appendChild(newCard);
        currentPage.after(newPage);

        newCard.appendChild(block);
        currentPage = newPage;
      }
    });
  });
}


  
function generateInsight(student, subjects) {

  const subjectScores = {};
  const allScores = [];

  Object.entries(subjects).forEach(([subject, rows]) => {
    if (subject === "__admission") return;

    const scores = rows
      .map(r => levelToScore(r.level))
      .filter(s => s > 0);

    if (!scores.length) return;

    const avg = scores.reduce((a,b)=>a+b,0) / scores.length;

    subjectScores[subject] = avg;

    allScores.push(...scores);
  });

  // ===== OVERALL LEVEL =====
  const overallAvg = allScores.length
    ? allScores.reduce((a,b)=>a+b,0) / allScores.length
    : null;

  const overall = overallAvg
    ? getAchievementLabel(overallAvg)
    : null;

  // ===== SUBJECT RANKING =====
  const subjectsArray = Object.entries(subjectScores)
    .map(([subject, avg]) => ({ subject, avg }))
    .sort((a,b)=>b.avg - a.avg);

  // ===== STRENGTH DETECTION =====
  let strengthSentence = "";

  if (
    subjectsArray.length > 1 &&
    subjectsArray[0].avg >= 3 &&
    subjectsArray[0].avg - subjectsArray[1].avg >= 0.5
  ) {
    strengthSentence =
      ", with stronger performance in <strong>" +
      subjectsArray[0].subject +
      "</strong>";
  }

  return `
  <p>
    Overall, based on current evidence, the learner is 
    ${getPerformanceBadge(overall)}
    ${strengthSentence}.
  </p>
  `;
}
 

function generateSupportFlag(student, subjects) {

  const subjectAverages = [];

  Object.entries(subjects).forEach(([subject]) => {
    if (subject === "__admission") return;

    const subjectData = avgMap?.[student]?.[subject];
    if (!subjectData) return;

    const score = Number(subjectData.average_score);
    if (!isNaN(score)) {
      subjectAverages.push(score);
    }
  });

  if (!subjectAverages.length) return "";

  const overall = subjectAverages.reduce((a,b)=>a+b,0) / subjectAverages.length;

  const belowCount = subjectAverages.filter(a => a <= 2).length;

  /* 🔴 NEEDS SUPPORT */
  if (
    overall < 2.3 ||          // overall struggling
    belowCount >= 2           // weak in 2+ subjects
  ) {
    return `<span style="color:#c0392b;font-weight:bold;">🔴 Needs Learning Support</span>`;
  }

  /* 🟢 HIGH POTENTIAL */
  if (
    overall >= 3.5 &&
    subjectAverages.every(a => a >= 3) &&
    subjectAverages.some(a => a >= 4)
  ) {
    return `<span style="color:#1e8449;font-weight:bold;">🟢 High Potential</span>`;
  }

  /* 🟡 DEFAULT */
  return `<span style="color:#b9770e;font-weight:bold;">🟡 On Track</span>`;
}

function generateStrengthsAndNeeds(student, subjects) {
  const strengths = [];
  const needs = [];

  // Collect subject averages
  const subjectScores = Object.entries(subjects)
    .filter(([sub]) => sub !== "__admission")  // skip metadata
    .map(([sub, rows]) => {
      const avg = rows
        .map(r => levelToScore(r.level))
        .filter(s => s > 0)
        .reduce((a,b) => a+b, 0) / rows.length;
      return { sub, avg };
    })
    .sort((a,b) => b.avg - a.avg);

  // Only top subject with clear difference is a strength
  if (subjectScores.length > 1 && (subjectScores[0].avg - subjectScores[1].avg >= 0.5)) {
    strengths.push(subjectScores[0].sub);
  }

  // Any subject below 2 (AE2 or lower) is a need
  subjectScores.forEach(s => {
    if (s.avg < 2) needs.push(s.sub);
  });

  return { strengths, needs };
}

function generateRecommendations(student, subjects, trend, supportFlag) {
  const teacher = [];
  const parent = [];
  const learner = [];

  const { strengths, needs } = generateStrengthsAndNeeds(student, subjects);

  /* ===== TEACHER ===== */
  if (supportFlag.includes("Needs Learning Support")) {
    teacher.push("Provide targeted remediation on identified weak competencies");
    teacher.push("Use differentiated instruction and more formative checks");
  }

  if (trend === "📉 Declining") {
    teacher.push("Review recent assessments to identify emerging gaps");
  }

  if (strengths.length) {
    teacher.push(`Encourage learner through strengths in ${strengths.join(", ")}`);
  }

  /* ===== PARENT ===== */
  if (needs.length) {
    parent.push(`Support practice in ${needs.join(", ")} at home`);
  }

  if (trend === "📉 Declining") {
    parent.push("Monitor homework completion and provide routine study time");
  }

  parent.push("Maintain communication with class teacher");

  /* ===== LEARNER ===== */
  if (strengths.length) {
    learner.push(`Build confidence by applying strengths in ${strengths.join(", ")}`);
  }

  if (needs.length) {
    learner.push(`Focus revision on ${needs.join(", ")}`);
  }

  learner.push("Ask for help when concepts are unclear");

  return { teacher, parent, learner };
}

const achievementBandsPlugin = {
  id: "achievementBands",
  beforeDraw(chart) {
    const { ctx, chartArea, scales } = chart;
    if (!chartArea) return;

    const y = scales.y;

    const bands = [
      { from: 1, to: 2, color: "rgba(248,215,218,0.35)" },   // Below
      { from: 2, to: 3, color: "rgba(255,243,205,0.35)" },   // Approaching
      { from: 3, to: 4, color: "rgba(212,237,218,0.35)" },   // Meeting
      { from: 4, to: 5, color: "rgba(204,229,255,0.35)" }    // Exceeding
    ];

    ctx.save();

    bands.forEach(b => {
      const yTop = y.getPixelForValue(b.to);
      const yBottom = y.getPixelForValue(b.from);

      ctx.fillStyle = b.color;
      ctx.fillRect(
        chartArea.left,
        yTop,
        chartArea.right - chartArea.left,
        yBottom - yTop
      );
    });

    ctx.restore();
  }
};

      <label>Subject</label><br />
      <select id="subjectSelect">
        <option value="">Select subject</option>
        ${subjects.map(s => `<option>${s}</option>`).join("")}
      </select>
    `;

    document.getElementById("subjectSelect").addEventListener("change", e => {
      const subject = e.target.value;
      if (!subject) return;

      const filtered = records.filter(r => r.subject === subject);

const grouped = {};

filtered.forEach(r => {
  grouped[r.student] ??= { __admission: r.admission };
  grouped[r.student][r.subject] ??= [];
  grouped[r.student][r.subject].push(r);
});


      
      reportDiv.innerHTML = `
        <h3>${subject} – All Students</h3>
        ${renderGrouped(grouped, avgMap)}
      `;

requestAnimationFrame(() => {
  splitLearnerIntoPages();
});   
    });
  }

/* ===== CLASS VIEW ===== */
if (viewMode.value === "class") {

  const classes = [...new Set(records.map(r => r.className).filter(Boolean))];

  if (!classes.length) {
    filterBox.innerHTML = "<p>No classes found for this term.</p>";
    return;
  }

  filterBox.innerHTML = `
    <label>Class</label><br />
    <select id="classSelect">
      <option value="">Select class</option>
      ${classes.map(c => `<option value="${c}">${c}</option>`).join("")}
    </select>
  `;

  document.getElementById("classSelect").addEventListener("change", e => {
    const selectedClass = e.target.value;
    if (!selectedClass) return;

    const filtered = records.filter(r => r.className === selectedClass);

    const grouped = {};
    filtered.forEach(r => {
      grouped[r.student] ??= { __admission: r.admission };
      grouped[r.student][r.subject] ??= [];
      grouped[r.student][r.subject].push(r);
    });

    reportDiv.innerHTML = `
      <h3>${selectedClass} – All Learners</h3>
      ${renderGrouped(grouped, avgMap)}
    `;

    requestAnimationFrame(() => {
      splitLearnerIntoPages();
    });
  });
}
}
termSelect.addEventListener("change", loadReport);
viewMode.addEventListener("change", loadReport);






  
function getTrend(currentAvg, previousAvg) {
  if (previousAvg === null) return "🆕 New Entry";

  const diff = currentAvg - previousAvg;

  if (diff >= 0.3) return "📈 Improving";
  if (diff <= -0.3) return "📉 Declining";
  return "➖ Stable";
}





window.downloadPDF = async function () {
  if (!reportDiv.innerHTML.trim()) {
    alert("No report to download");
    return;
  }

  const term = termSelect.options[termSelect.selectedIndex]?.text || "Term";
  const filename = `Summary_Report_${term}_${SYSTEM_YEAR}.pdf`;

  const original = reportDiv;
  const clone = original.cloneNode(true);

  // Remove class summary titles
  clone.querySelectorAll("h3").forEach(h3 => {
    if (h3.innerText.includes("All Learners")) h3.remove();
  });

  // Remove screen pagination divs
  clone.querySelectorAll(".a4-page").forEach(page => {
    const parent = page.parentNode;
    while (page.firstChild) parent.insertBefore(page.firstChild, page);
    parent.removeChild(page);
  });

  clone.style.width = "190mm";
  clone.style.margin = "0 auto";
  clone.style.padding = "0";
  clone.style.boxSizing = "border-box";

  // Prevent header/logo from splitting
  clone.querySelectorAll(".report-overview").forEach(el => {
    el.style.pageBreakInside = "avoid";
    el.style.breakInside = "avoid";
  });

  const cards = clone.querySelectorAll(".learner-card");

  cards.forEach((card, index) => {
    card.style.margin = "0";
    card.style.padding = "0";
    card.style.boxSizing = "border-box";

   // Instead of index === 0 ? "auto" : "always"
card.style.pageBreakInside = "avoid"; // Keeps the student card together
card.style.pageBreakBefore = "auto";  // Allows it to follow the header naturally

    // Remove old table blocks
    card.querySelectorAll(".subject-block, .trend-box").forEach(el => el.remove());

    const studentName = card.querySelector("h4")?.innerText
      .replace("👤", "")
      .replace(/\(.*?\)/, "")
      .trim();

    const subjectData = avgMap?.[studentName];
    if (!subjectData) return;

    const numericScoresMap = {};
    const numericScores = [];

    Object.entries(subjectData).forEach(([subject, d]) => {
      const score = levelToScore(d.achievement_level);
      if (score > 0) {
        numericScores.push(score);
        numericScoresMap[subject] = score;
      }
    });

    let overallAvg = numericScores.length
      ? numericScores.reduce((a, b) => a + b, 0) / numericScores.length
      : 0;
    overallAvg = Number(overallAvg.toFixed(2));

    const subjectsArray = Object.entries(numericScoresMap)
      .map(([subject, score]) => ({ subject, score }))
      .sort((a, b) => b.score - a.score);

    let strengths = [];
    if (subjectsArray.length > 1 && subjectsArray[0].score - subjectsArray[1].score >= 0.5) {
      strengths.push(subjectsArray[0].subject);
    } else if (subjectsArray.length >= 1) {
      strengths = subjectsArray.map(s => s.subject);
    }

    function overallLevel(score) { return getAchievementLabel(score); }
    function generalComment(score) {
      const level = getAchievementLabel(score);
      if (level === "EE2") return "Outstanding mastery of learning expectations.";
      if (level === "EE1") return "Very strong performance across most learning areas.";
      if (level === "ME2") return "Consistently meets learning expectations.";
      if (level === "ME1") return "Generally meeting expectations with good progress.";
      if (level === "AE2") return "Approaching expectations; improvement is evident.";
      if (level === "AE1") return "Developing understanding; continued effort needed.";
      if (level === "BE2") return "Below expectations; structured support recommended.";
      if (level === "BE1") return "Significant support required to meet expectations.";
      return "No performance data available.";
    }
    function commentFromScore(score) {
      const level = getAchievementLabel(score);
      if (level === "EE2") return "Outstanding performance. Keep up the excellent work.";
      if (level === "EE1") return "Very good performance. Continue striving for excellence.";
      if (level === "ME2") return "Consistently meets expectations.";
      if (level === "ME1") return "Good progress in most learning areas.";
      if (level === "AE2") return "Approaching expectations; more practice will help.";
      if (level === "AE1") return "Developing understanding; continued effort required.";
      if (level === "BE2") return "Below expectations; structured support recommended.";
      if (level === "BE1") return "Significant improvement required.";
      return "";
    }

    // Build subject table
    const table = document.createElement("table");
    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.marginTop = "6px";
    table.style.fontSize = "14px";
    table.style.tableLayout = "fixed";

    table.innerHTML = `
      <thead>
        <tr>
          <th style="border:1px solid #000;padding:8px;width:30%;">Learning Area/Subject</th>
          <th style="border:1px solid #000;padding:8px;width:25%;">Performance Level</th>
          <th style="border:1px solid #000;padding:8px;width:30%;">Teacher Comment</th>
        </tr>
      </thead>
      <tbody>
        ${Object.entries(subjectData).map(([subject, d]) => {
          const avg = numericScoresMap[subject] || 0;
          return `
            <tr>
              <td style="border:1px solid #000;padding:8px;">${subject}</td>
              <td style="border:1px solid #000;padding:8px;">${d.achievement_level}</td>
              <td style="border:1px solid #000;padding:8px;">${commentFromScore(avg)}</td>
            </tr>
          `;
        }).join("")}
      </tbody>
    `;

    const generalBlock = document.createElement("div");
    generalBlock.style.marginTop = "10px";
    generalBlock.style.fontSize = "14px";
    generalBlock.style.lineHeight = "1.8";

    generalBlock.innerHTML = `
      <table style="width:100%;border-collapse:collapse;margin-top:6px;">
        <tr>
          <td style="border:1px solid #000;padding:8px;width:40%;"><strong>Learner's General Performance Level</strong></td>
          <td style="border:1px solid #000;padding:8px;">${overallLevel(overallAvg)}</td>
        </tr>
        <tr>
          <td style="border:1px solid #000;padding:8px;"><strong>Teacher's General Comment</strong></td>
          <td style="border:1px solid #000;padding:12px;">${generalComment(overallAvg)}</td>
        </tr>
      </table>
      <p>💪 Strengths: ${strengths.join(", ")}</p>
    `;

    const footer = document.createElement("div");
    footer.style.fontSize = "10px";
    footer.style.textAlign = "center";
    footer.style.marginTop = "12px";
    footer.style.borderTop = "1px solid #ddd";
    footer.style.paddingTop = "6px";
    footer.innerText = "Assessment is competency-based and evidence-driven, guided by KICD CBE curriculum designs.";

    const tableWrapper = document.createElement("div");
    tableWrapper.appendChild(table);
    tableWrapper.appendChild(generalBlock);
    tableWrapper.appendChild(footer);

    card.appendChild(tableWrapper);
  });

 const batchSize = 8;

for (let i = 0; i < cards.length; i += batchSize) {

  const batchContainer = document.createElement("div");
  batchContainer.style.width = "190mm";
  batchContainer.style.margin = "0 auto";

  const batch = Array.from(cards).slice(i, i + batchSize);

  batch.forEach(learnerCard => {
    const wrapper = document.createElement("div");
    wrapper.style.pageBreakAfter = "always";
    wrapper.appendChild(learnerCard.cloneNode(true));
    batchContainer.appendChild(wrapper);
  });

  await html2pdf().set({
    margin: [15, 10, 15, 10],
    filename: `${filename.replace(".pdf","")}_part${Math.floor(i/batchSize)+1}.pdf`,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
    pagebreak: { mode: ['css','legacy'] }
  }).from(batchContainer).save();
}
};
