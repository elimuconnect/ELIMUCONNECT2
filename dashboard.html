<!DOCTYPE html>
<html>
<head>
  <title>Marketer Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }

    button {
      padding: 10px;
      margin-top: 5px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .logout {
      background: red;
      width: auto;
      padding: 8px 15px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Marketer Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3 id="code">Loading...</h3>
  <h4 id="earnings">Earnings: 0</h4>
</div>

<div class="card">
  <h3>Add School</h3>

  <input id="school" placeholder="School Name">
  <input id="contact" placeholder="Contact Person">
  <input id="phone" placeholder="Phone">
  <input id="county" placeholder="County">

  <button onclick="addSchool()">Add School</button>
</div>

<div class="card">
  <h3>My Schools</h3>
  <div id="schools"></div>
</div>

<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let marketer = null;

/* ---------------- INIT ---------------- */


async function init() {

 


  const { data: { session } } = await client.auth.getSession();
const user = session?.user;

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const { data, error } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (error || !data) {
    console.log("USER:", user.id);
    console.log("ERROR:", error);
    alert("Marketer profile not found");
    return;
  }

  marketer = data;

  document.getElementById("code").innerText =
    "Your Code: " + marketer.code;

  loadSchools();
  loadEarnings();
}


  
/* ---------------- ADD SCHOOL ---------------- */
async function addSchool() {
  const { error } = await client.from("schools").insert({
    school_name: document.getElementById("school").value,
    contact_person: document.getElementById("contact").value,
    phone: document.getElementById("phone").value,
    county: document.getElementById("county").value,
    marketer_code: marketer.code
  });

  if (error) {
    alert(error.message);
  } else {
    alert("School added!");
    loadSchools();
  }
}

/* ---------------- LOAD SCHOOLS ---------------- */
async function loadSchools() {

  if (!marketer) return;
  const { data } = await client
    .from("schools")
    .select("*")
    .eq("marketer_id", marketer.id);

  let html = "";

  if (!data || data.length === 0) {
    html = "<p>No schools yet</p>";
  } else {
    data.forEach(s => {
      html += `
        <div class="card">
          <b>${s.school_name}</b><br>
          Status: ${s.status || "contacted"}
        </div>
      `;
    });
  }

  document.getElementById("schools").innerHTML = html;
}

/* ---------------- LOAD EARNINGS ---------------- */
async function loadEarnings() {

  if (!marketer) return;
  const { data } = await client
    .from("commissions")
    .select("*")
    .eq("marketer_id", marketer.id);

  let total = 0;

  if (data) {
    data.forEach(c => {
      total += Number(c.amount || 0);
    });
  }

  document.getElementById("earnings").innerText =
    "Earnings: " + total;
}

/* ---------------- LOGOUT ---------------- */
async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

/* ---------------- START ---------------- */
init();
</script>

</body>
</html>
