<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f9f9f9; }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Marketer Dashboard</h2>

<div class="card">
  <h3 id="code">Loading...</h3>
</div>

<div class="card">
  <h3>Add School</h3>

  <input id="school" placeholder="School Name"><br>
  <input id="contact" placeholder="Contact Person"><br>
  <input id="phone" placeholder="Phone"><br>
  <input id="county" placeholder="County"><br>

  <button onclick="addSchool()">Add School</button>
</div>

<div class="card">
  <h3>My Schools</h3>
  <div id="schools"></div>
</div>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let marketer = null;

async function init() {
  const { data: user } = await supabase.auth.getUser();

  const { data } = await supabase
    .from("marketers")
    .select("*")
    .eq("user_id", user.user.id)
    .single();

  marketer = data;

  document.getElementById("code").innerText =
    "Your Code: " + marketer.code;

  loadSchools();
}

async function addSchool() {
  await supabase.from("schools").insert({
    school_name: document.getElementById("school").value,
    contact_person: document.getElementById("contact").value,
    phone: document.getElementById("phone").value,
    county: document.getElementById("county").value,
    marketer_code: marketer.code
  });

  alert("School added!");
  loadSchools();
}

async function loadSchools() {
  const { data } = await supabase
    .from("schools")
    .select("*")
    .eq("marketer_id", marketer.id);

  let html = "";

  data.forEach(s => {
    html += `<div class="card">
      <b>${s.school_name}</b><br>
      Status: ${s.status}
    </div>`;
  });

  document.getElementById("schools").innerHTML = html;
}

init();
</script>

</body>
</html>
