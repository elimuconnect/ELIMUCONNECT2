<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Elimu Connect | CBC School Digital Systems</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #0b3c5d;
  --secondary: #1f7a8c;
  --accent: #e36414;
  --light: #f5f7fa;
  --dark: #1c1c1c;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* Navbar */
.navbar {
  background: var(--primary);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
}
.navbar h1 { font-size:1.4rem; margin:0; }
.nav-links { display:flex; gap:12px; }
.nav-links a {
  background: var(--accent);
  padding: 12px 20px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:600;
}
.nav-links a:hover { background: var(--secondary); }

/* Hamburger */
.hamburger { display:none; flex-direction:column; cursor:pointer; }
.hamburger div { width:28px; height:3px; background:white; margin:4px 0; }
.mobile-menu {
  display:none;
  flex-direction:column;
  gap:8px;
  background:var(--primary);
  padding:10px 24px;
}
.mobile-menu a {
  color:white; font-weight:600; text-decoration:none; padding:10px 12px;
  border-radius:6px; background: var(--accent);
}
.mobile-menu a:hover { background: var(--secondary); }

@media(max-width:768px){
  .nav-links { display:none; }
  .hamburger { display:flex; }
}
</style>
</head>
<body>

<nav class="navbar">
  <h1>Smart Elimu Connect</h1>
  <div class="nav-links">
    <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin" target="_blank">ICT Tools</a>
    <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin2" target="_blank">Extra ICT Tools</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/index2" target="_blank">Analytics (Marks → Competencies)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/" target="_blank">Analytics (Direct CBC)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/resultsmarksbest" target="_blank">Reports (Marks)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/reportcompetency" target="_blank">Reports (Competency)</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin" target="_blank">ICT Tools</a>
  <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin2" target="_blank">Extra ICT Tools</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/index2" target="_blank">Analytics (Marks → Competencies)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/" target="_blank">Analytics (Direct CBC)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/resultsmarksbest" target="_blank">Reports (Marks)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/reportcompetency" target="_blank">Reports (Competency)</a>
</div>

<script>
function toggleMenu(){
  const menu = document.getElementById('mobileMenu');
  menu.style.display = menu.style.display==='flex' ? 'none':'flex';
}
// Optional: hide mobile menu when resizing to desktop
window.addEventListener('resize', ()=>{ if(window.innerWidth>768) document.getElementById('mobileMenu').style.display='none'; });
</script>

</body>
</html>
