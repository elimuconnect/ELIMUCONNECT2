<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Elimu Connect | CBC School Digital Systems</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary: #0b3c5d;    /* Navbar background */
  --light: #f5f7fa;
  --dark: #1c1c1c;
  /* Nav link colors */
  --home: #f39c12;
  --ict: #16a085;
  --extra-ict: #2980b9;
  --analytics-marks: #8e44ad;
  --analytics-cbc: #27ae60;
  --reports-marks: #c0392b;
  --reports-competency: #d35400;
}

/* Reset */
body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background: var(--light); color: var(--dark); }

/* Navbar */
.navbar {
  background: var(--primary);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
}
.navbar h1 { font-size:1.4rem; margin:0; color:white; }

/* Desktop nav buttons */
.nav-links { display:flex; gap:10px; }
.nav-links a {
  padding: 10px 18px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-weight:600;
  transition: 0.3s;
}
.nav-links a.home { background: var(--home); }
.nav-links a.ict { background: var(--ict); }
.nav-links a.extra-ict { background: var(--extra-ict); }
.nav-links a.analytics-marks { background: var(--analytics-marks); }
.nav-links a.analytics-cbc { background: var(--analytics-cbc); }
.nav-links a.reports-marks { background: var(--reports-marks); }
.nav-links a.reports-competency { background: var(--reports-competency); }

/* Hover */
.nav-links a:hover { opacity:0.85; }

/* Hamburger */
.hamburger { display:none; flex-direction:column; cursor:pointer; }
.hamburger div { width:28px; height:3px; background:white; margin:4px 0; }

/* Mobile menu */
.mobile-menu {
  display:none;
  flex-direction:column;
  gap:8px;
  background: var(--primary);
  padding:10px 24px;
}
.mobile-menu a {
  color:white; font-weight:600; text-decoration:none; padding:10px 12px; border-radius:6px;
}
.mobile-menu a.home { background: var(--home); }
.mobile-menu a.ict { background: var(--ict); }
.mobile-menu a.extra-ict { background: var(--extra-ict); }
.mobile-menu a.analytics-marks { background: var(--analytics-marks); }
.mobile-menu a.analytics-cbc { background: var(--analytics-cbc); }
.mobile-menu a.reports-marks { background: var(--reports-marks); }
.mobile-menu a.reports-competency { background: var(--reports-competency); }
.mobile-menu a:hover { opacity:0.85; }

/* Responsive */
@media(max-width:768px){
  .nav-links { display:none; }
  .hamburger { display:flex; }
}
</style>
</head>
<body>

<nav class="navbar">
  <h1>Smart Elimu Connect</h1>

  <!-- Desktop nav -->
  <div class="nav-links">
    <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schoolicttools" class="home">Home</a>
    <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin" class="ict">ICT Tools</a>
    <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin2" class="extra-ict">Extra ICT Tools</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/index2" class="analytics-marks">Analytics (Marks → Competencies)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/" class="analytics-cbc">Analytics (Direct CBC)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/resultsmarksbest" class="reports-marks">Reports (Marks)</a>
    <a href="https://elimuconnect.github.io/ELIMUCONNECT2/reportcompetency" class="reports-competency">Reports (Competency)</a>
  </div>

  <!-- Hamburger for mobile -->
  <div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
  </div>
</nav>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/elimu" class="home">Home</a>
  <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin" class="ict">ICT Tools</a>
  <a href="https://elimuconnect.github.io/ELIMU-CONNECT-/schooladmin2" class="extra-ict">Extra ICT Tools</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/index2" class="analytics-marks">Analytics (Marks → Competencies)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/" class="analytics-cbc">Analytics (Direct CBC)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/resultsmarksbest" class="reports-marks">Reports (Marks)</a>
  <a href="https://elimuconnect.github.io/ELIMUCONNECT2/reportcompetency" class="reports-competency">Reports (Competency)</a>
</div>

<script>
function toggleMenu(){
  const menu = document.getElementById('mobileMenu');
  menu.style.display = menu.style.display==='flex' ? 'none':'flex';
}
window.addEventListener('resize', ()=>{ if(window.innerWidth>768) document.getElementById('mobileMenu').style.display='none'; });
</script>

</body>
</html>
