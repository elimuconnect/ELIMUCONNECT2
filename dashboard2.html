<!DOCTYPE html>
<html>
<head>
  <title>Marketer Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }

    button {
      padding: 10px;
      margin-top: 5px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .logout {
      background: red;
      width: auto;
      padding: 8px 15px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Marketer Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3 id="code">Loading...</h3>
  <h4 id="earnings">Earnings: 0</h4>
</div>

<div class="card">
  <h3>Add School</h3>

  <input id="school" placeholder="School Name">
  <input id="contact" placeholder="Contact Person">
  <input id="phone" placeholder="Phone">
  <input id="county" placeholder="County">

  <button onclick="addSchool()">Add School</button>
</div>

<div class="card">
  <h3>My Schools</h3>
  <div id="schools"></div>
</div>



<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";
const PAID_KEY_BASE = "elimu_paid_ref";
  
// IMPORTANT: persistent auth client
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let marketer = null;

/* ---------------- INIT ---------------- */

async function init() {

  const { data } = await client.auth.getSession();
  const user = data?.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: marketerData, error } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (error || !marketerData) {
    alert("Marketer profile not found");
    return;
  }

  marketer = marketerData;

  // NOW safe to build key
  const PAID_KEY = PAID_KEY_BASE + "_" + marketer.id;

  // NOW safe to handle payment return
  await handlePaymentReturn(PAID_KEY);

  // status check
  if (marketer.status !== "approved") {

    let message = "";

    if (marketer.status === "pending") message = "⏳ Awaiting approval";
    if (marketer.status === "suspended") message = "⏸️ Suspended";
    if (marketer.status === "blocked") message = "🚫 Blocked";

    alert(message);

    await client.auth.signOut();
    window.location.href = "login.html";
    return;
  }

  document.getElementById("code").innerText =
    "Your Code: " + marketer.code;

  loadSchools();
  loadEarnings();
}

const ref = new URLSearchParams(location.search).get("reference");


  

/* ---------------- ADD SCHOOL ---------------- */
async function addSchool() {

  if (!marketer) return;

  const { error } = await client.from("schools").insert({
    school_name: document.getElementById("school").value.trim(),
    contact_person: document.getElementById("contact").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    county: document.getElementById("county").value.trim(),
    marketer_id: marketer.id, // IMPORTANT FIX (better than code)
    marketer_code: marketer.code
  });

  if (error) {
    alert(error.message);
  } else {
    alert("School added!");
    loadSchools();
  }
}


async function loadSchools() {

  const { data: schoolsData } = await client
    .from("schools")
    .select("*")
    .eq("marketer_id", marketer.id);

  const { data: commissions } = await client
    .from("commissions")
    .select("school_id, amount");

  // build map (FAST + RELIABLE)
  const map = {};

  commissions?.forEach(c => {
    map[c.school_id] = (map[c.school_id] || 0) + Number(c.amount || 0);
  });

  let html = "";

  schoolsData.forEach(s => {

    const schoolTotal = map[s.id] || 0;

  html += `
  <div class="card">
    <b>${s.school_name}</b><br>
    Contact: ${s.contact_person}<br>
    Phone: ${s.phone}<br><br>

    💰 Commission: Ksh ${schoolTotal}<br><br>

    <button onclick="paySchool('${s.id}', '${s.school_name}')">
      Pay for this School
    </button>
  </div>
`;
  });

  document.getElementById("schools").innerHTML = html;
}

  

async function loadEarnings() {

  const { data } = await client
    .from("commissions")
    .select("amount")
    .eq("marketer_id", marketer.id);

  let total = 0;

  if (data) {
    data.forEach(c => {
      total += Number(c.amount || 0);
    });
  }

  document.getElementById("earnings").innerText =
    "Earnings: Ksh " + total;
}
/* ---------------- LOGOUT ---------------- */
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

function paySchool(schoolId) {

  const pending = {
    school_id: schoolId,
    amount: 10000
  };

  localStorage.setItem("pending_payment", JSON.stringify(pending));

  console.log("NEW PAYMENT:", pending);

  window.location.href = "https://paystack.shop/pay/dqt-e-uc8j";
}

async function handlePaymentReturn(PAID_KEY) {

  const ref = new URLSearchParams(location.search).get("reference");
  if (!ref) return;

  const savedRef = localStorage.getItem(PAID_KEY);
  if (savedRef === ref) return;



const pendingRaw = localStorage.getItem("pending_payment");

if (!pendingRaw) {
  console.log("No pending payment found");
  return;
}

let pending;

try {
  pending = JSON.parse(pendingRaw);
} catch (e) {
  console.log("Corrupt pending data");
  localStorage.removeItem("pending_payment");
  return;
}

const amount = Number(pending.amount);

if (!Number.isFinite(amount) || amount <= 0) {
  console.log("Invalid amount:", pending);
  localStorage.removeItem("pending_payment");
  return;
}
  

  const term = "Term 1";
  const year = new Date().getFullYear();

  // 1. CHECK DUPLICATE PAYMENT


const { data: existing } = await client
  .from("payments")
  .select("id")
  .eq("school_id", pending.school_id)
  .eq("term", term)
  .eq("year", year)
  .maybeSingle();

if (existing) {
  alert("Already paid for this term!");
  localStorage.removeItem("pending_payment");
  return;
}

  

  // 2. INSERT PAYMENT
  const { data: payment, error } = await client
    .from("payments")
    .insert({
      school_id: pending.school_id,
      amount: pending.amount,
      reference: ref,
      term,
      year,
      paid_at: new Date().toISOString()
    })
    .select()
    .single();

  if (error) {
    console.log(error);
    return;
  }

  // 3. GET MARKETER FROM SCHOOL
  const { data: school } = await client
    .from("schools")
    .select("marketer_id")
    .eq("id", pending.school_id)
    .single();

  const marketer_id = school?.marketer_id;

  // 4. CREATE COMMISSION


const { data: commissionData, error: commissionError } = await client
  .from("commissions")
  .insert({
    school_id: pending.school_id,
    marketer_id,
    amount: pending.amount * 0.2,
    
  })
  .select();

console.log("COMMISSION RESULT:", commissionData);
console.log("COMMISSION ERROR:", commissionError);

if (commissionError) {
  alert("Commission failed: " + commissionError.message);
  return;
}
  

  // 5. SAVE REF
  localStorage.setItem(PAID_KEY, ref);

  // 6. CLEANUP
  localStorage.removeItem("pending_payment");

  // 7. CLEAN URL
  window.history.replaceState({}, document.title, window.location.pathname);

  loadSchools();
  loadEarnings();
}


  
window.onload = async function () {
  await init();              // loads marketer FIRST
  
};

</script>
</body>
</html>
