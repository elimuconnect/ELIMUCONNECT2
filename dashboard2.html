<!DOCTYPE html>
<html>
<head>
  <title>Marketer Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #0f172a;
    color: #1e293b;
  }

  /* ===== TOPBAR ===== */
  .topbar {
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: center;   /* ✅ center content */
  align-items: center;
  position: relative;        /* ✅ allows absolute logout */
}

.topbar h2 {
  margin: 0;
  font-weight: 600;
  text-align: center;        /* ✅ ensure center */
}



.logout {
  position: absolute;        /* ✅ move to right */
  right: 20px;
  
  width: auto;               /* ✅ FIX BIG WIDTH */
  padding: 6px 12px;         /* smaller */
  
  background: #ef4444;
  border-radius: 8px;
  font-weight: 500;
}

.logout:hover {
  background: #dc2626;
}
    

  /* ===== LAYOUT ===== */
  .container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
  }

  /* ===== CARDS ===== */
  .card {
    background: white;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  /* ===== INPUTS ===== */
  input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
  }

  /* ===== BUTTONS ===== */
  button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }

  /* ===== GRID ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
  }

  /* ===== BADGES ===== */
  .status {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
  }

  .paid {
    background: #dcfce7;
    color: #166534;
  }

  .not-paid {
    background: #fee2e2;
    color: #991b1b;
  }

  /* ===== MATERIAL SECTION ===== */
  #materials .card {
    border-left: 5px solid #4f46e5;
  }

  video {
    border-radius: 10px;
    margin-top: 10px;
  }


h3 {
color:#3730a3;
  border-left: 4px solid #4f46e5;
  padding-left: 10px;
  margin-bottom: 15px;
}

</style>
</head>



<body>

<div class="topbar">
  <h2>📊 Marketer Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

  
<div class="card">
  <h3 id="code">Loading...</h3>
  <h4 id="earnings">Earnings: 0</h4>
</div>

<div class="card">
  <h3>Add School</h3>

  <input id="school" placeholder="School Name">
  <input id="contact" placeholder="Contact Person">
  <input id="phone" placeholder="Phone">
  <input id="county" placeholder="County">

  <button onclick="addSchool()">Add School</button>
</div>

<div class="card">
  <h3>My Schools</h3>
  <div id="schools"></div>
</div>


<h3>📚 Training Materials</h3>
<div id="materials"></div>

</div>

<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";
const PAID_KEY_BASE = "elimu_paid_ref";


 const term = "Term 2";
const year = "2026";
  
// IMPORTANT: persistent auth client
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let marketer = null;

/* ---------------- INIT ---------------- */

async function init() {

  const { data } = await client.auth.getSession();
  const user = data?.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: marketerData, error } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (error || !marketerData) {
    alert("Marketer profile not found");
    return;
  }

  marketer = marketerData;

  // NOW safe to build key
  const PAID_KEY = PAID_KEY_BASE + "_" + marketer.id;

  // NOW safe to handle payment return
  await handlePaymentReturn(PAID_KEY);

  // status check
  if (marketer.status !== "approved") {

    let message = "";

    if (marketer.status === "pending") message = "⏳ Awaiting approval";
    if (marketer.status === "suspended") message = "⏸️ Suspended";
    if (marketer.status === "blocked") message = "🚫 Blocked";

    alert(message);

    await client.auth.signOut();
    window.location.href = "login.html";
    return;
  }

  document.getElementById("code").innerText =
    "Your Code: " + marketer.code;

  loadSchools();
  loadEarnings();
   loadMaterials();
}

const ref = new URLSearchParams(location.search).get("reference");


  

/* ---------------- ADD SCHOOL ---------------- */
async function addSchool() {

  if (!marketer) return;

  const { error } = await client.from("schools").insert({
    school_name: document.getElementById("school").value.trim(),
    contact_person: document.getElementById("contact").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    county: document.getElementById("county").value.trim(),
    marketer_id: marketer.id, // IMPORTANT FIX (better than code)
    marketer_code: marketer.code
  });

  if (error) {
    alert(error.message);
  } else {
    alert("School added!");
    loadSchools();
  }
}

async function loadSchools() {

  const { data: schoolsData } = await client
    .from("schools")
    .select("*")
    .eq("marketer_id", marketer.id);

 
  const { data: commissions } = await client
  .from("commissions")
  .select("school_id, amount")
  .eq("term", term)
  .eq("year", year);
   

const { data: payments } = await client
  .from("payments")
  .select("school_id, reference")
  .eq("term", term)
  .eq("year", year);



  // COMMISSION MAP
  const commissionMap = {};
  commissions?.forEach(c => {
    commissionMap[c.school_id] =
      (commissionMap[c.school_id] || 0) + Number(c.amount || 0);
  });

  // PAYMENT MAP
  const paymentMap = {};
  payments?.forEach(p => {
    paymentMap[p.school_id] = p.reference;
  });

  let html = "";

  schoolsData?.forEach(s => {

    const ref = paymentMap[s.id];

    const status = ref ? "✅ PAID" : "❌ NOT PAID";
    const refText = ref ? `Ref: ${ref}` : "";

    const schoolTotal = commissionMap[s.id] || 0;

   html += `
  <div class="card">
    <h3>${s.school_name}</h3>

    <span class="status ${ref ? "paid" : "not-paid"}">
      ${status}
    </span>

    <p>${refText}</p>

    <p><b>👤 Contact:</b> ${s.contact_person}</p>
    <p><b>📞 Phone:</b> ${s.phone}</p>

    <p><b>💰 Commission:</b> Ksh ${schoolTotal}</p>

    <button onclick="paySchool('${s.id}')">
      💳 Pay School Fee
    </button>
  </div>
    `;
  });

  document.getElementById("schools").innerHTML = html; 
}
  

async function loadEarnings() {


const { data } = await client
  .from("commissions")
  .select("amount")
  .eq("marketer_id", marketer.id)
  .eq("term", term)
  .eq("year", year);

  
  let total = 0;

  if (data) {
    data.forEach(c => {
      total += Number(c.amount || 0);
    });
  }

  document.getElementById("earnings").innerText =
    "Earnings: Ksh " + total;
}
/* ---------------- LOGOUT ---------------- */
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

function paySchool(schoolId) {

  const pending = {
    school_id: schoolId,
    amount: 10000
  };

  localStorage.setItem("pending_payment", JSON.stringify(pending));

  console.log("NEW PAYMENT:", pending);

  window.location.href = "https://paystack.shop/pay/dqt-e-uc8j";
}




  async function handlePaymentReturn(PAID_KEY) {

  const ref = new URLSearchParams(location.search).get("reference");
  if (!ref) return;

  const savedRef = localStorage.getItem(PAID_KEY);
  if (savedRef === ref) return;

  const pendingRaw = localStorage.getItem("pending_payment");

  if (!pendingRaw) {
    console.log("No pending payment found");
    return;
  }

  let pending;

  try {
    pending = JSON.parse(pendingRaw);
  } catch (e) {
    console.log("Corrupt pending data");
    localStorage.removeItem("pending_payment");
    return;
  }

  const amount = Number(pending.amount);

  if (!Number.isFinite(amount) || amount <= 0) {
    console.log("Invalid amount:", pending);
    localStorage.removeItem("pending_payment");
    return;
  }

  // 1. CHECK DUPLICATE PAYMENT
  const { data: existing } = await client
    .from("payments")
    .select("id")
    .eq("school_id", pending.school_id)
    .eq("term", term)
    .eq("year", year)
    .maybeSingle();

  if (existing) {
    alert("Already paid for this term!");
    localStorage.removeItem("pending_payment");
    return;
  }

  // 2. INSERT PAYMENT
  const { data: payment, error: paymentError } = await client
    .from("payments")
    .insert({
      school_id: pending.school_id,
      amount: pending.amount,
      reference: ref,
      term,
      year,
      paid_at: new Date().toISOString()
    })
    .select()
    .single();

  if (paymentError) {
    console.log("PAYMENT ERROR:", paymentError);
    return;
  }

  // 3. GET MARKETER FROM SCHOOL
  const { data: school } = await client
    .from("schools")
    .select("marketer_id")
    .eq("id", pending.school_id)
    .single();

  const marketer_id = school?.marketer_id;

  // 4. INSERT COMMISSION
  const { error: commissionError } = await client
    .from("commissions")
    .insert({
      school_id: pending.school_id,
      marketer_id,
      amount: pending.amount * 0.2,
      term,
    year
    });

  if (commissionError) {
    console.log("COMMISSION ERROR:", commissionError);
    return;
  }

  // 5. SAVE REF (ONLY AFTER EVERYTHING SUCCESSFUL)
  localStorage.setItem(PAID_KEY, ref);

  // 6. CLEAN LOCAL STORAGE
  localStorage.removeItem("pending_payment");

  // 7. CLEAN URL (ONLY NOW SAFE)
 window.history.replaceState(null, "", window.location.pathname);

  // 8. REFRESH UI
  await loadSchools();
  await loadEarnings();

  alert("Payment successful!");
}


async function loadMaterials() {

  const { data, error } = await client
    .from("training_materials")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  let html = "";

  data.forEach(m => {

    const type = (m.file_type || "").toLowerCase();

   
   html += `
  <div class="card">

    <h4>📘 ${m.title}</h4>
    <p>${m.description || "No description provided"}</p>

    <!-- FILE TYPE BADGE -->
    <div style="margin-bottom:10px;">
      <span style="
        background:#e0e7ff;
        color:#3730a3;
        padding:4px 10px;
        border-radius:20px;
        font-size:12px;
        font-weight:bold;
      ">
        ${type.includes("pdf") ? "PDF Document" :
          type.includes("video") ? "Video Training" :
          type.includes("image") ? "Image File" :
          "File"}
      </span>
    </div>

    ${type.includes("pdf") ? `
      <a href="${m.file_url}" target="_blank" style="color:#2563eb; display:block; margin-bottom:8px;">
        📄 Open PDF
      </a>

      <button onclick="downloadFile('${m.file_url}', '${m.title}.pdf')">
        ⬇️ Download PDF
      </button>
    ` : ""}

    ${type.includes("video") ? `
      <a href="${m.file_url}" target="_blank" style="color:#2563eb; display:block; margin-bottom:8px;">
        🎥 Watch / Open Video
      </a>

      <button onclick="downloadFile('${m.file_url}', '${m.title}.mp4')">
        ⬇️ Download Video
      </button>
    ` : ""}

    ${!type.includes("pdf") && !type.includes("video") ? `
      <button onclick="downloadFile('${m.file_url}', '${m.title}')">
        📁 Download File
      </button>
    ` : ""}

  </div>
`;
  });

  document.getElementById("materials").innerHTML = html;
}




async function downloadFile(fileUrl, filename) {

  try {

    // 1. convert public URL to storage path
    const path = fileUrl.split("/training-files/")[1];

    const { data, error } = await client.storage
      .from("training-files")
      .download(path);

    if (error) {
      console.log(error);
      alert("Download failed");
      return;
    }

    // 2. create blob download
    const blob = new Blob([data]);
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename || "file";
    document.body.appendChild(a);
    a.click();

    a.remove();
    window.URL.revokeObjectURL(url);

  } catch (err) {
    console.log(err);
    alert("Download error");
  }
}


  
  
window.onload = async function () {
  await init();              // loads marketer FIRST
  
};

</script>
</body>
</html>
