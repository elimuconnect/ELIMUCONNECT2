<!DOCTYPE html>
<html>
<head>
  <title>ELIMU CONNECT Admin</title> 

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h2 { margin-bottom: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 25px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th { background: #eee; }

    input {
      padding: 8px;
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .clickable {
      cursor: pointer;
      color: blue;
    }


    .loader {
  border: 3px solid #e5e7eb;
  border-top: 3px solid #2563eb;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  display: inline-block;
  animation: spin 1s linear infinite;
  margin-right: 5px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>


<h3>Upload Training Material</h3>

<input id="title" placeholder="Title">
<input id="description" placeholder="Description">
<input type="file" id="file">

<button onclick="uploadMaterial()">Upload</button>
  <p id="uploadStatus" style="font-size:14px; color:#64748b;"></p>




  
<div class="grid" id="stats"></div>

<input id="search" placeholder="Search marketers..." oninput="renderMarketers()">

<div id="detail"></div>

<div id="tables">
  <div id="marketers"></div>
  <div id="schools"></div>
  <div id="payments"></div>
</div>


<h3>📚 Training Materials</h3>
<div id="materials"></div>
  
<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let marketers = [];
let schools = [];
let payments = [];
let selectedMarketer = null;

/* ---------------- INIT WITH SESSION CHECK ---------------- */
async function init() {

  const { data: sessionData } = await client.auth.getSession();
  const user = sessionData?.session?.user;

  // 1. CHECK LOGIN
  if (!user) {
    alert("Not logged in");
    window.location.href = "login.html";
    return;
  }

  // 2. CHECK IF ADMIN
  const { data: profile } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (!profile || profile.role !== "admin") {
    alert("Access denied: Admin only");
    window.location.href = "dashboard.html";
    return;
  }

  // 3. LOAD DATA
  await loadAll();
  loadStats();
 loadMaterials();
}

/* ---------------- LOAD ALL DATA ---------------- */
async function loadAll() {
  const m = await client.from("marketers").select("*");



  const s = await client
  .from("schools")
  .select(`
    id,
    school_name,
    contact_person,
    phone,
    county,
    
    marketer_id,
    marketers (
      name,
      code
    )
  `);




const p = await client
  .from("payments")
  .select(`
    id,
    amount,
    term,
    year,
    school_id,
    schools (
      school_name
    )
  `);


payments = p.error ? [] : p.data; 

  marketers = m.data || [];
  schools = s.data || [];
  

  renderMarketers();
  renderSchools();
  renderPayments();
}

/* ---------------- STATS ---------------- */
function loadStats() {
  const totalRevenue = payments.reduce((a,b)=>a + Number(b.amount||0),0);

  document.getElementById("stats").innerHTML = `
    <div class="card"><b>💰 Revenue</b><br>${totalRevenue}</div>
    <div class="card"><b>🏫 Schools</b><br>${schools.length}</div>
    <div class="card"><b>👥 Marketers</b><br>${marketers.length}</div>
  `;
}

/* ---------------- MARKETERS ---------------- */

function renderMarketers() {
  const q = document.getElementById("search").value?.toLowerCase() || "";

  let filtered = marketers.filter(m =>
    (m.name||"").toLowerCase().includes(q) ||
    (m.email||"").toLowerCase().includes(q) ||
    (m.code||"").toLowerCase().includes(q)
  );

  let html = `<h3>👥 Marketers</h3>
  <table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Code</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>`;

  filtered.forEach(m => {
    html += `
      <tr>
        <td class="clickable" onclick="viewMarketer('${m.id}')">${m.name}</td>
        <td>${m.email}</td>
        <td>${m.phone}</td>
        <td>${m.code}</td>
        <td>${m.status}</td>
        <td>
          <button onclick="updateStatus('${m.id}','approved')">Approve</button>
          <button onclick="updateStatus('${m.id}','suspended')">Suspend</button>
          <button onclick="updateStatus('${m.id}','blocked')">Block</button>
          <button onclick="deleteMarketer('${m.id}')">Remove</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("marketers").innerHTML = html;
}


async function deleteMarketer(id) {

  const confirmDelete = confirm("Delete this marketer permanently?");
  if (!confirmDelete) return;

  const { error } = await client
    .from("marketers")
    .delete()
    .eq("id", id);

  if (error) {
    alert(error.message);
  } else {
    alert("Marketer removed");
    loadAll();
  }
}
async function updateStatus(id, status) {

  const confirmAction = confirm("Are you sure?");
  if (!confirmAction) return;

  const { error } = await client
    .from("marketers")
    .update({ status: status })
    .eq("id", id);

  if (error) {
    alert(error.message);
  } else {
    alert("Status updated to " + status);
    loadAll(); // refresh data
  }
}



  
/* ---------------- VIEW MARKETER ---------------- */
function viewMarketer(id) {
  selectedMarketer = marketers.find(m => m.id === id);

  const mySchools = schools.filter(s => s.marketer_id === id);
  const myPayments = payments.filter(p => p.marketer_id === id);

  let total = myPayments.reduce((a,b)=>a + Number(b.amount||0),0);

  document.getElementById("detail").innerHTML = `
    <div class="card">
      <h3>${selectedMarketer.name}</h3>
      <p><b>Code:</b> ${selectedMarketer.code}</p>
      <p><b>County:</b> ${selectedMarketer.county}</p>
      <p><b>Total Earnings:</b> ${total}</p>
      <p><b>Schools:</b> ${mySchools.length}</p>
    </div>
  `;
}

/* ---------------- SCHOOLS ---------------- */


function renderSchools() {
  let html = `<h3>🏫 Schools (with Marketers)</h3>
  <table>
  <tr>
    <th>School</th>
    <th>Contact</th>
    <th>Phone</th>
    <th>County</th>
    <th>Marketer</th>
    <th>Code</th>
    <th>Status</th>
  </tr>`;

  schools.forEach(s => {

    // ✅ CHECK IF SCHOOL HAS PAYMENT
    const paid = payments.find(p => p.school_id === s.id);

    html += `
      <tr>
        <td>${s.school_name}</td>
        <td>${s.contact_person}</td>
        <td>${s.phone}</td>
        <td>${s.county}</td>
        <td>${s.marketers?.name || "Unknown"}</td>
        <td>${s.marketers?.code || "-"}</td>
        <td>
          ${paid 
            ? "✅ Paid (Ksh " + paid.amount + ")" 
            : "❌ Pending"}
        </td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("schools").innerHTML = html;
}

  

function renderPayments() {
  let html = `<h3>💰 Payments</h3>
  <table>
  <tr>
    <th>School</th><th>Amount</th><th>Term</th><th>Year</th>
  </tr>`;

  payments.forEach(p => {
    html += `
      <tr>
      <td>${p.schools?.school_name || "Unknown"}</td>
        <td>${p.amount || 0}</td>
        <td>${p.term}</td>
        <td>${p.year}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("payments").innerHTML = html;
}




async function uploadMaterial() {

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("file").files[0];
  const statusEl = document.getElementById("uploadStatus");
  const btn = event.target;

  if (!file) return alert("Select file first");

  // 🔵 START LOADING
statusEl.innerHTML = '<span class="loader"></span> Uploading document...';
  statusEl.style.color = "#2563eb";
  btn.disabled = true;
  btn.innerText = "Uploading...";

  try {

    const safeName = file.name.replace(/\s/g, "_");
    const filePath = `training/${Date.now()}_${safeName}`;

    // 1. upload file
    const { error } = await client
      .storage
      .from("training-files")
      .upload(filePath, file);

    if (error) throw error;

    // 2. get public URL
    const { data: urlData } = client
      .storage
      .from("training-files")
      .getPublicUrl(filePath);

    const file_url = urlData.publicUrl;

    // 3. save to DB
    const { error: dbError } = await client
      .from("training_materials")
      .insert({
        title,
        description,
        file_url,
        file_type: file.type
      });

    if (dbError) throw dbError;

    // 🟢 SUCCESS
    statusEl.innerHTML = "✅ Upload successful!";
    statusEl.style.color = "#16a34a";

    // reset form
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("file").value = "";

  } catch (err) {
    console.log(err);

    // 🔴 ERROR
    statusEl.innerHTML = "❌ Upload failed. Try again.";
    statusEl.style.color = "#dc2626";
  }

  // 🔁 RESET BUTTON
  btn.disabled = false;
  btn.innerText = "Upload";
}
loadMaterials();  




async function loadMaterials() {

  const { data, error } = await client
    .from("training_materials")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  let html = "";

  data.forEach(m => {

    html += `
      <div class="card">

        <h4>📘 ${m.title}</h4>
        <p>${m.description || "No description"}</p>

        <div style="display:flex; gap:10px; margin-top:10px;">

          <a href="${m.file_url}" target="_blank" style="color:#2563eb;">
            📂 Open
          </a>

          <button 
            style="background:#ef4444; width:auto; padding:6px 12px;"
            onclick="deleteMaterial('${m.id}', '${m.file_url}')">
            🗑 Delete
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("materials").innerHTML = html;
}


async function deleteMaterial(id, fileUrl) {

  const confirmDelete = confirm("Delete this material?");
  if (!confirmDelete) return;

  try {

    // remove from storage
    const path = fileUrl.split("/training-files/")[1];

    await client.storage
      .from("training-files")
      .remove([path]);

    // remove from database
    const { error } = await client
      .from("training_materials")
      .delete()
      .eq("id", id);

    if (error) throw error;

    alert("✅ Deleted successfully");

    loadMaterials();

  } catch (err) {
    console.log(err);
    alert("❌ Delete failed");
  }
}

  
/* ---------------- START ---------------- */
init();
</script>
</body>
</html>
