<!DOCTYPE html>
<html>
<head>
  <title>ELIMU CONNECT Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h2 { margin-bottom: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 25px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th { background: #eee; }

    input {
      padding: 8px;
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .clickable {
      cursor: pointer;
      color: blue;
    }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<div class="grid" id="stats"></div>

<input id="search" placeholder="Search marketers..." oninput="renderMarketers()">

<div id="detail"></div>

<div id="tables">
  <div id="marketers"></div>
  <div id="schools"></div>
  <div id="payments"></div>
</div>

<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let marketers = [];
let schools = [];
let payments = [];
let selectedMarketer = null;

/* ---------------- INIT WITH SESSION CHECK ---------------- */
async function init() {

  const { data: sessionData } = await client.auth.getSession();
  const user = sessionData?.session?.user;

  // 1. CHECK LOGIN
  if (!user) {
    alert("Not logged in");
    window.location.href = "login.html";
    return;
  }

  // 2. CHECK IF ADMIN
  const { data: profile } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (!profile || profile.role !== "admin") {
    alert("Access denied: Admin only");
    window.location.href = "dashboard.html";
    return;
  }

  // 3. LOAD DATA
  await loadAll();
  loadStats();
}

/* ---------------- LOAD ALL DATA ---------------- */
async function loadAll() {
  const m = await client.from("marketers").select("*");
  const s = await client.from("schools").select("*");



const p = await client
  .from("payments")
  .select(`
    id,
    amount,
    term,
    year,
    marketer_id,
    school_id,
    schools:school_id (
      school_name
    )
  `);




  

  marketers = m.data || [];
  schools = s.data || [];
  payments = p.data || [];

  renderMarketers();
  renderSchools();
  renderPayments();
}

/* ---------------- STATS ---------------- */
function loadStats() {
  const totalRevenue = payments.reduce((a,b)=>a + Number(b.amount||0),0);

  document.getElementById("stats").innerHTML = `
    <div class="card"><b>💰 Revenue</b><br>${totalRevenue}</div>
    <div class="card"><b>🏫 Schools</b><br>${schools.length}</div>
    <div class="card"><b>👥 Marketers</b><br>${marketers.length}</div>
  `;
}

/* ---------------- MARKETERS ---------------- */
function renderMarketers() {
  const q = document.getElementById("search").value?.toLowerCase() || "";

  let filtered = marketers.filter(m =>
    (m.name||"").toLowerCase().includes(q) ||
    (m.email||"").toLowerCase().includes(q) ||
    (m.code||"").toLowerCase().includes(q)
  );

  let html = `<h3>👥 Marketers</h3>
  <table>
  <tr>
    <th>Name</th><th>Email</th><th>Phone</th><th>Code</th><th>Status</th>
  </tr>`;

  filtered.forEach(m => {
    html += `
      <tr>
        <td class="clickable" onclick="viewMarketer('${m.id}')">${m.name}</td>
        <td>${m.email}</td>
        <td>${m.phone}</td>
        <td>${m.code}</td>
        <td>${m.status}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("marketers").innerHTML = html;
}

/* ---------------- VIEW MARKETER ---------------- */
function viewMarketer(id) {
  selectedMarketer = marketers.find(m => m.id === id);

  const mySchools = schools.filter(s => s.marketer_id === id);
  const myPayments = payments.filter(p => p.marketer_id === id);

  let total = myPayments.reduce((a,b)=>a + Number(b.amount||0),0);

  document.getElementById("detail").innerHTML = `
    <div class="card">
      <h3>${selectedMarketer.name}</h3>
      <p><b>Code:</b> ${selectedMarketer.code}</p>
      <p><b>County:</b> ${selectedMarketer.county}</p>
      <p><b>Total Earnings:</b> ${total}</p>
      <p><b>Schools:</b> ${mySchools.length}</p>
    </div>
  `;
}

/* ---------------- SCHOOLS ---------------- */
function renderSchools() {
  let html = `<h3>🏫 Schools</h3>
  <table>
  <tr>
    <th>Name</th><th>Contact</th><th>Phone</th><th>County</th><th>Status</th>
  </tr>`;

  schools.forEach(s => {
    html += `
      <tr>
        <td>${s.school_name}</td>
        <td>${s.contact_person}</td>
        <td>${s.phone}</td>
        <td>${s.county}</td>
        <td>${s.payment_status}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("schools").innerHTML = html;
}



function renderPayments() {
  let html = `<h3>💰 Payments</h3>
  <table>
  <tr>
    <th>School</th><th>Amount</th><th>Term</th><th>Year</th>
  </tr>`;

  payments.forEach(p => {
    html += `
      <tr>
        <td>${p.schools?.school_name || "Unknown"}</td>
        <td>${p.amount}</td>
        <td>${p.term}</td>
        <td>${p.year}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("payments").innerHTML = html;
}

  
/* ---------------- START ---------------- */
init();
</script>
</body>
</html>
