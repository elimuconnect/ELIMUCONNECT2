<!DOCTYPE html>
<html>
<head>
  <title>ELIMU CONNECT Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

     .login-container {
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);

    width: 92%;
    max-width: 460px; /* bigger desktop */
    min-width: 280px;

    text-align: center;
  }

  h2 {
    margin-bottom: 26px;
    font-size: 28px;
  }

  input {
    width: 100%;
    padding: 18px;
    margin: 12px 0;

    border: 1px solid #ccc;
    border-radius: 10px;

    font-size: 18px;
  }

  button {
    width: 100%;
    padding: 18px;
    background: #0066ff;
    border: none;
    border-radius: 10px;

    color: white;
    font-size: 18px;

    margin-top: 14px;
  }

  .footer-text {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
  }

  /* Mobile extra boost */
  @media (max-width: 600px) {
    .login-container {
      width: 96%;
      padding: 36px;
    }

    h2 {
      font-size: 30px;
    }

    input, button {
      font-size: 19px;
      padding: 20px;
    }
  }



  .input-group{
position:relative;
width:100%;
margin:12px 0;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#0066ff;
user-select:none;
}
</style>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
  <div class="input-group">
<input id="password" type="password" placeholder="Password">
<span class="toggle" onclick="togglePassword('password',this)">Show</span>
</div>
    <button id="loginBtn">Login</button>

    <p class="footer-text">Secure login powered by Supabase</p>

    <div class="input-group">
<input id="newPassword" type="password" placeholder="New Password">
<span class="toggle" onclick="togglePassword('newPassword',this)">Show</span>
</div>
    <button id="updateBtn">Update Password</button>
  </div>



<script>
function togglePassword(id,el){

const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
el.innerText="Hide";
}else{
input.type="password";
el.innerText="Show";
}

}


<script>
function togglePassword(id,el){

const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
el.innerText="Hide";
}else{
input.type="password";
el.innerText="Show";
}


<script>
const SUPABASE_URL = "https://hhtplinfcdwgahlhurhx.supabase.co";
const SUPABASE_KEY = "sb_publishable_cOXipkG4wSKIkIHwkP04JA_KunvG7T5";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true
  }
});

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  // 1. Login
  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  // 2. Find role in marketers table
  const { data: profile, error: profileError } = await client
    .from("marketers")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (profileError || !profile) {
    alert("No profile found");
    return;
  }

  // 3. Redirect based on role
  if (profile.role === "admin") {
    window.location.href = "adminmarketer.html";
  } else {
    window.location.href = "dashboard.html";
  }
}




    document.getElementById("updateBtn").onclick = async () => {
  const newPass = document.getElementById("newPassword").value;

  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated successfully");
  }
};

</script>
</body>
</html>
