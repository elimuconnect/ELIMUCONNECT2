<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h2 { margin-top: 20px; }
  select, button { margin: 5px; padding: 5px; }
  div.status { margin-top: 5px; color: green; }
  table { border-collapse: collapse; width: 100%; margin-top: 10px; }
  table, th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  button { cursor: pointer; }
</style>
</head>
<body>

<h1>Admin Dashboard</h1>
<div id="status"></div>

<h2>Existing Teachers</h2>
<select id="teacherSelect"></select>

<h2>Assign Classes & Subjects</h2>
<select id="classSelect"></select>
<select id="subjectSelect" multiple></select>
<button id="assignBtn">Assign</button>
<div id="assignStatus" class="status"></div>

<h2>Current Assignments</h2>
<div id="currentAssignments">Select a teacher to view assignments</div>



<h2>Add Student (Single Entry)</h2>

<input type="text" id="studentName" placeholder="Full Name">
<select id="studentGender">
  <option value="">Select Gender</option>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
</select>

<input type="text" id="admissionNumber" placeholder="Admission Number">
<input type="date" id="dob">
<input type="number" id="admissionYear" placeholder="Admission Year">
<select id="studentClass"></select>

<button id="addStudentBtn">Add Student</button>
<div id="studentStatus" class="status"></div>



<h2>Upload Students (Excel)</h2>

<input type="file" id="excelFile" accept=".xlsx, .xls">
<select id="excelClass"></select>
<button id="uploadExcelBtn">Upload</button>
<div id="excelStatus" class="status"></div>

  
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://zcmzuetusvpmvubbjlmx.supabase.co",
  "sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn"
);

const teacherSelect = document.getElementById("teacherSelect");
const classSelect = document.getElementById("classSelect");
const subjectSelect = document.getElementById("subjectSelect");
const assignStatus = document.getElementById("assignStatus");
const currentAssignmentsDiv = document.getElementById("currentAssignments");

// --------------------
// 0️⃣ Auth & Admin Check
// --------------------
const { data: { user } } = await supabase.auth.getUser();
if (!user) throw new Error("Not logged in");

const { data: adminProfile } = await supabase
  .from("profiles")
  .select("*")
  .eq("auth_id", user.id)
  .single();

if (!adminProfile || adminProfile.role !== "admin") {
  alert("Access denied: Admins only");
  throw new Error("Not an admin");
}

// --------------------
// 1️⃣ Load Teachers
// --------------------
async function loadTeachers() {
  const { data: teachers, error } = await supabase
    .from("profiles")
    .select("id, full_name")
    .eq("role", "teacher")
    .eq("school_id", adminProfile.school_id);

  if (error) { console.error(error); teacherSelect.innerHTML = `<option>Error loading teachers</option>`; return; }
  if (!teachers || teachers.length === 0) { teacherSelect.innerHTML = `<option>No teachers found</option>`; return; }

  teacherSelect.innerHTML = teachers.map(t => `<option value="${t.id}">${t.full_name || "No Name"}</option>`).join('');
  loadCurrentAssignments();
}

// --------------------
// 2️⃣ Load Classes & Subjects
// --------------------
async function loadClasses() {
  const { data: classes } = await supabase
    .from("classes")
    .select("id, name")
    .eq("school_id", adminProfile.school_id);

  classSelect.innerHTML = classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadSubjects() {
  const { data: subjects, error } = await supabase
    .from("subjects")
    .select("id, name")
    .or(`school_id.eq.${adminProfile.school_id},school_id.is.null`);

  if (error) { 
    console.error(error); 
    subjectSelect.innerHTML = `<option>Error loading subjects</option>`; 
    return; 
  }

  subjectSelect.innerHTML = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}
// --------------------
// 3️⃣ Assign Subjects to Teacher
// --------------------
document.getElementById("assignBtn").onclick = async () => {
  const teacherId = teacherSelect.value;
  const classId = classSelect.value;
  const selectedSubjects = Array.from(subjectSelect.selectedOptions).map(o => o.value);

  if (!teacherId || !classId || !selectedSubjects.length) {
    assignStatus.innerText = "Select teacher, class, and subjects"; return;
  }

  // Check existing assignments
  const { data: existing } = await supabase
    .from("teacher_subjects")
    .select("subject_id")
    .eq("teacher_id", teacherId)
    .eq("class_id", classId);

  const existingIds = existing?.map(e => e.subject_id) || [];
  const newRows = selectedSubjects
    .filter(subjId => !existingIds.includes(subjId))
    .map(subjId => ({ teacher_id: teacherId, class_id: classId, subject_id: subjId }));

  if (newRows.length === 0) {
    assignStatus.innerText = "All selected subjects are already assigned"; return;
  }

  const { error } = await supabase.from("teacher_subjects").insert(newRows);
  if (error) assignStatus.innerText = "Error: " + error.message;
  else { assignStatus.innerText = "Assigned successfully"; loadCurrentAssignments(); }
};

// --------------------
// 4️⃣ Load Current Assignments
// --------------------
async function loadCurrentAssignments() {
  const teacherId = teacherSelect.value;
  if (!teacherId) { currentAssignmentsDiv.innerHTML = "Select a teacher to view assignments"; return; }

  const { data: assignments, error } = await supabase
    .from("teacher_subjects")
    .select(`
      id,
      class_id,
      subject_id,
      classes ( name ),
      subjects ( name )
    `)
    .eq("teacher_id", teacherId);

  if (error) { console.error(error); currentAssignmentsDiv.innerHTML = "Error loading assignments"; return; }
  if (!assignments || assignments.length === 0) { currentAssignmentsDiv.innerHTML = "No assignments yet"; return; }

  currentAssignmentsDiv.innerHTML = `
    <table>
      <tr>
        <th>Class</th>
        <th>Subject</th>
        <th>Action</th>
      </tr>
      ${assignments.map(a => `
        <tr>
          <td>${a.classes?.name || "N/A"}</td>
          <td>${a.subjects?.name || "N/A"}</td>
          <td>
            <button class="unassign"
              data-teacher="${teacherId}"
              data-class="${a.class_id}"
              data-subject="${a.subject_id}">
              Unassign
            </button>
          </td>
        </tr>
      `).join('')}
    </table>
  `;
}

// --------------------
// Handle Unassign properly
// --------------------
currentAssignmentsDiv.addEventListener("click", async (e) => {
  if (!e.target.classList.contains("unassign")) return;

  // Convert IDs to correct type (UUIDs in string form are fine)
  const teacherId = e.target.dataset.teacher;
  const classId = e.target.dataset.class;
  const subjectId = e.target.dataset.subject;

  if (!teacherId || !classId || !subjectId) {
    alert("Invalid assignment data"); 
    return;
  }

  // ✅ Delete using exact UUIDs
  const { data, error } = await supabase
    .from("teacher_subjects")
    .delete()
    .match({
      teacher_id: teacherId,
      class_id: classId,
      subject_id: subjectId
    });

  if (error) {
    alert("Error unassigning: " + error.message);
    console.error(error);
  } else {
    alert("Unassigned successfully");
    loadCurrentAssignments(); // refresh table
  }
});

// --------------------
// 6️⃣ Reload assignments on teacher change
// --------------------
teacherSelect.addEventListener("change", loadCurrentAssignments);




const studentClass = document.getElementById("studentClass");

async function loadStudentClasses() {
  const { data: classes } = await supabase
    .from("classes")
    .select("id, name")
    .eq("school_id", adminProfile.school_id);

  studentClass.innerHTML = classes
    .map(c => `<option value="${c.id}">${c.name}</option>`)
    .join('');
}


document.getElementById("addStudentBtn").onclick = async () => {

  const full_name = document.getElementById("studentName").value;
  const gender = document.getElementById("studentGender").value;
  const admission_number = document.getElementById("admissionNumber").value;
  const date_of_birth = document.getElementById("dob").value;
  const admission_year = document.getElementById("admissionYear").value;
  const class_id = studentClass.value;

  if (!full_name || !gender || !admission_number || !class_id) {
    document.getElementById("studentStatus").innerText = "Fill all required fields";
    return;
  }

  const { error } = await supabase.from("students").insert([
    {
      school_id: adminProfile.school_id,
      class_id,
      full_name,
      gender,
      admission_number,
      date_of_birth,
      admission_year
    }
  ]);

  if (error) {
    document.getElementById("studentStatus").innerText = error.message;
  } else {
    document.getElementById("studentStatus").innerText = "Student added successfully";
  }
};


const excelClass = document.getElementById("excelClass");

async function loadExcelClasses() {
  const { data: classes } = await supabase
    .from("classes")
    .select("id, name")
    .eq("school_id", adminProfile.school_id);

  excelClass.innerHTML = classes
    .map(c => `<option value="${c.id}">${c.name}</option>`)
    .join('');
}

await loadExcelClasses();

  
// --------------------
// 7️⃣ Initial Load
// --------------------
await loadTeachers();
await loadClasses();
await loadSubjects();
await loadStudentClasses();


  document.getElementById("uploadExcelBtn").onclick = async () => {

  const file = document.getElementById("excelFile").files[0];
  const class_id = excelClass.value;

  if (!file) {
    document.getElementById("excelStatus").innerText = "Select Excel file";
    return;
  }

  const reader = new FileReader();

  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet);

    const studentsToInsert = jsonData.map(row => ({
      school_id: adminProfile.school_id,
      class_id,
      full_name: row.full_name,
      gender: row.gender,
      admission_number: row.admission_number,
      date_of_birth: row.date_of_birth,
      admission_year: row.admission_year
    }));

    const { error } = await supabase.from("students").insert(studentsToInsert);

    if (error) {
      document.getElementById("excelStatus").innerText = error.message;
    } else {
      document.getElementById("excelStatus").innerText =
        studentsToInsert.length + " students uploaded successfully";
    }
  };

  reader.readAsArrayBuffer(file);
};
</script>
</body>
</html>
