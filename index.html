<!DOCTYPE html>
<html>
<head>
  <title>CBC Login</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f4f6fb;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
  }

  .login-container {
    background: white;
    padding: 36px;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);

    width: 95%;
    max-width: 420px; /* bigger on mobile */
    text-align: center;
  }

  h2 {
    margin-bottom: 24px;
    font-size: 26px;
  }

  input {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 17px;
  }

  button {
    width: 100%;
    padding: 16px;
    background: #0066ff;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 17px;
    margin-top: 14px;
  }

  .footer-text {
    margin-top: 16px;
    font-size: 14px;
    color: #777;
  }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    .login-container {
      width: 96%;
      padding: 32px;
    }

    input, button {
      font-size: 36px; /* bigger mobile text */
    }
  }
</style>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p class="footer-text">Secure login powered by Supabase</p>

    <input id="newPassword" type="password" placeholder="New Password">
    <button id="updateBtn">Update Password</button>
  </div>




  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://zcmzuetusvpmvubbjlmx.supabase.co",
      "sb_publishable_-BGJLAySaH7bQ5lBIZF9zg_eohK-xEn"
    );

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }




      
      const { data: { user } } = await supabase.auth.getUser();

     const { data: profile, error: profileError } = await supabase
  .from("profiles")
  .select("role")
  .eq("auth_id", user.id)
  .single();

if (profileError || !profile) {
  alert("Profile not found. Contact admin.");
  return;
}

if (profile.role === "teacher") {
  window.location.href = "teacher.html";
} else if (profile.role === "parent") {
  window.location.href = "parent.html";
} else if (profile.role === "admin") {
  window.location.href = "admin.html";
} else {
  alert("Unknown role");
}

      
    };


    document.getElementById("updateBtn").onclick = async () => {
  const newPass = document.getElementById("newPassword").value;

  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated successfully");
  }
};
  </script>

</body>
</html>
